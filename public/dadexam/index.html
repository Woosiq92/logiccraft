<style>
  :root{

  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}

  .app{max-width:430px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;background:var(--bg)}

  main::-webkit-scrollbar{width:0;height:0}
  @keyframes popIn{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}

  /* tabbar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;max-width:430px;margin:0 auto;display:flex;
    padding:8px 8px 18px;border-top:1px solid var(--line);background:var(--card)}
  .tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;
    background:transparent;border:none;cursor:pointer;font-family:inherit;color:var(--muted)}
  .tabbar button .ic{font-size:19px}
  .tabbar button .lb{font-size:11px;font-weight:600}
  .tabbar button.on{color:var(--primary)}

  /* home */
  .home{padding:8px 20px 28px}
  .h-title{font-size:27px;font-weight:800;letter-spacing:-.6px;padding-top:14px}
  .h-sub{margin-top:7px;font-size:14px;color:var(--muted)}
  .disc{display:flex;gap:9px;margin-top:16px;padding:13px 15px;border-radius:14px;
    background:var(--primary-soft);font-size:12.5px;line-height:1.55;color:var(--primary)}
  .stage{margin-top:24px}
  .stage-hd{display:flex;align-items:baseline;gap:8px;padding:0 2px}

    font-family:inherit;color:var(--ink)}
  .subj .nm{font-size:15.5px;font-weight:600}
  .subj .mt{margin-top:3px;font-size:12.5px;color:var(--muted)}

  .badge{flex:0 0 auto;white-space:nowrap;padding:5px 11px;border-radius:99px;font-size:12px}
  .badge.none{font-weight:600;background:transparent;border:1px solid var(--line);color:var(--muted)}
  .badge.have{font-weight:700;border:none;background:var(--primary-soft);color:var(--primary)}
  .badge.top{font-weight:700;border:none;background:var(--amber-soft);color:var(--amber)}

  /* quiz */
  .quiz{display:flex;flex-direction:column;min-height:100%}
  .q-top{padding:10px 20px 0}
  .q-topbar{display:flex;align-items:center;gap:12px}
  .q-back{flex:0 0 auto;width:34px;height:34px;border-radius:12px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);font-size:20px;line-height:1;cursor:pointer;font-family:inherit}
  .q-sub{flex:1;font-size:14px;font-weight:600}
  .q-prog{font-size:13px;font-weight:600;color:var(--muted)}
  .q-bar{margin-top:14px;height:6px;border-radius:99px;background:var(--line);overflow:hidden}
  .q-bar i{display:block;height:100%;border-radius:99px;background:var(--primary)}
  .q-body{padding:26px 20px 16px;flex:1}
  .q-text{font-size:20px;font-weight:700;line-height:1.45;letter-spacing:-.3px}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:22px}

    font-size:15.5px;line-height:1.4;cursor:pointer;font-family:inherit}
  .opt .ob{flex:0 0 auto;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:13px;font-weight:700;border:1.5px solid var(--line);
    color:var(--muted);background:transparent}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg)}
  .opt.correct .ob{border:none;color:#fff;background:var(--correct)}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
  .opt.wrong .ob{border:none;color:#fff;background:var(--wrong)}
  .opt.dim{opacity:.5}
  .fb{flex:0 0 auto;margin-top:auto;padding:20px;border-top:1px solid var(--line);
    background:var(--card);animation:popIn .18s ease-out}
  .fb .verdict{font-size:16px;font-weight:700}
  .fb .exp{margin-top:8px;font-size:14px;line-height:1.6;opacity:.85}
  .fb .src{margin-top:11px;font-size:11.5px;color:var(--muted)}
  .btn{width:100%;padding:16px;border:none;border-radius:14px;background:var(--primary);color:#fff;
    font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn.ghost{background:transparent;border:1.5px solid var(--primary);color:var(--primary)}
  .fb .btn{margin-top:18px}

  /* result */
  .result{padding:18px 24px 34px;display:flex;flex-direction:column;align-items:center}
  .r-cap{font-size:13.5px;color:var(--muted);margin-top:6px}
  .gauge{position:relative;width:196px;height:196px;border-radius:50%;margin-top:22px}
  .gauge i{position:absolute;inset:15px;border-radius:50%;background:var(--card);display:flex;
    flex-direction:column;align-items:center;justify-content:center;font-style:normal}
  .gauge .sc{font-size:46px;font-weight:800;line-height:1;letter-spacing:-1px}
  .gauge .of{margin-top:4px;font-size:14px;color:var(--muted)}
  .r-note{margin-top:12px;max-width:250px;text-align:center;font-size:12px;line-height:1.55;color:var(--muted)}
  .pill{display:inline-block;border-radius:99px;font-weight:700}
  .pill.big{padding:9px 20px;font-size:17px;margin-top:22px}
  .pill.sm{padding:6px 14px;font-size:14px}
  .pill.gold{background:var(--amber-soft);color:var(--amber)}
  .pill.primary{background:var(--primary-soft);color:var(--primary)}
  .pill.muted{background:var(--line);color:var(--muted)}
  .result .btn,.result .btn.ghost{margin-top:26px}
  .result .btn.ghost{margin-top:10px}

  /* wrong + report */
  .pad{padding:14px 20px 30px}
  .pg-title{font-size:22px;font-weight:800;letter-spacing:-.4px}
  .pg-sub{margin-top:6px;font-size:13.5px;color:var(--muted)}
  .w-item{position:relative;padding:15px 42px 15px 15px;border-radius:16px;border:1px solid var(--line);background:var(--card)}
  .w-tag{display:inline-block;padding:4px 10px;border-radius:99px;font-size:11.5px;font-weight:600;
    background:var(--amber-soft);color:var(--amber)}
  .w-prev{margin-top:9px;font-size:14.5px;line-height:1.45}
  .w-x{position:absolute;top:12px;right:12px;width:24px;height:24px;border:none;background:transparent;
    color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;opacity:.7}
  .empty{display:flex;flex-direction:column;align-items:center;text-align:center;padding:70px 20px}
  .empty .ec{width:76px;height:76px;border-radius:50%;background:var(--primary-soft);display:flex;
    align-items:center;justify-content:center;font-size:32px}
  .avg-card{margin-top:16px;display:flex;align-items:center;gap:18px;padding:20px;border-radius:18px;background:var(--primary-soft)}
  .avg-card .lb{font-size:12.5px;color:var(--primary);opacity:.9}
  .avg-card .big{display:flex;align-items:baseline;gap:3px;margin-top:4px;color:var(--primary)}
  .avg-card .big b{font-size:40px;font-weight:800;line-height:1;letter-spacing:-1px}
  .avg-card .big span{font-size:16px;font-weight:700}
  .rp-list{display:flex;flex-direction:column;gap:16px;margin-top:22px}
  .rp-row .hd{display:flex;justify-content:space-between;align-items:baseline}
  .rp-row .hd .n{font-size:14px}
  .rp-row .hd .s{font-size:13px;font-weight:700;color:var(--muted)}
  .rp-bar{margin-top:7px;height:8px;border-radius:99px;background:var(--line);overflow:hidden}
  .rp-bar i{display:block;height:100%;border-radius:99px;background:var(--primary)}
  .share-lb{margin-top:28px;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.2px}
  .share{margin-top:10px;aspect-ratio:1/1;width:100%;border-radius:22px;padding:26px;background:var(--card);
    border:1px solid var(--line);display:flex;flex-direction:column}
  .share .brand{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--primary)}
  .share .mid{flex:1;display:flex;flex-direction:column;justify-content:center}
  .share .big{font-size:25px;font-weight:800;letter-spacing:-.6px;line-height:1.3}
  .share .meta{margin-top:14px;font-size:13.5px;color:var(--muted)}
  .share .foot{font-size:10.5px;line-height:1.5;color:var(--muted);opacity:.85}
</style>

<body>
<div class="app">
  <main id="view"></main>
  <nav class="tabbar">
    <button data-tab="home" class="on"><span class="ic">📝</span><span class="lb">시험</span></button>
    <button data-tab="wrong"><span class="ic">📕</span><span class="lb">오답노트</span></button>
    <button data-tab="report"><span class="ic">📊</span><span class="lb">성적표</span></button>
  </nav>
</div>
<script>
const STAGES=[{key:"prep",name:"예비 아빠"},{key:"newborn",name:"신생아 (0~100일)"},{key:"common",name:"공통 · 육아 용어"}];
const GRADES=[[90,"마스터 아빠","gold"],[75,"베테랑 아빠","primary"],[60,"주니어 아빠","primary"],[40,"수습 아빠","muted"],[0,"인턴 아빠","muted"]];
const LS_BEST="dadexam.best", LS_WRONG="dadexam.wrong";
const SHARE_BASE="https://logiccraft.co.kr/dadexam/"; // 공유 링크는 항상 웹으로(Capacitor에서도)
let QS=[], subjects=[], view=document.getElementById("view");

const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const gradeOf=p=>GRADES.find(g=>p>=g[0]);
const bestMap=()=>load(LS_BEST,{});
const wrongSet=()=>new Set(load(LS_WRONG,[]));
const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const pill=(tone,big)=>`pill ${big?"big":"sm"} ${tone}`;

async function init(){
  try{ QS=await (await fetch("./data/questions.json")).json(); }
  catch(e){ view.innerHTML='<div class="empty" style="padding-top:120px">문항을 불러오지 못했어요.</div>'; return; }
  const seen={};
  QS.forEach(q=>{const k=q.stage+"|"+q.subject; if(!seen[k])seen[k]={stage:q.stage,subject:q.subject,items:[]}; seen[k].items.push(q);});
  subjects=Object.values(seen);
  document.querySelectorAll(".tabbar button").forEach(b=>b.onclick=()=>go(b.dataset.tab));
  const p=new URLSearchParams(location.search);
  const ch=p.get("ch"), sc=parseInt(p.get("sc"),10);
  if(ch && subjects.some(s=>s.subject===ch)){ renderChallenge(ch, isFinite(sc)?sc:null); }
  else go("home");
}
function setTab(t){document.querySelectorAll(".tabbar button").forEach(b=>b.classList.toggle("on",b.dataset.tab===t));
  document.querySelector(".tabbar").style.display=t?"flex":"none";}
function go(t){setTab(t);({home:renderHome,wrong:renderWrong,report:renderReport}[t])();view.scrollTop=0;}

/* ---------- HOME ---------- */
function renderHome(){
  const best=bestMap();
  let h=`<div class="home">
    <div class="h-title">아빠자격시험</div>
    <div class="h-sub">시험 보듯 육아 상식을 스스로 점검해요.</div>
    <div class="disc"><span>🌱</span><span>재미로 보는 자가점검이에요. 국가공인 자격이 아니고, 의료 조언을 대신하지 않아요.</span></div>`;
  STAGES.forEach(st=>{
    const subs=subjects.filter(s=>s.stage===st.key);
    if(!subs.length)return;
    h+=`<div class="stage"><div class="stage-hd"><span class="t">${st.name}</span><span class="c">${subs.length}과목</span></div><div class="subs">`;
    subs.forEach(s=>{
      const b=best[s.subject];
      let badge = b==null ? `<div class="badge none">미응시</div>`
        : `<div class="badge ${b>=90?"top":"have"}">최고 ${b}점</div>`;
      h+=`<button class="subj" data-subj="${esc(s.subject)}">
        <div style="flex:1;min-width:0"><div class="nm">${esc(s.subject)}</div><div class="mt">${s.items.length>QUIZ_N?`${s.items.length}문항 중 ${QUIZ_N}문제 출제`:`${s.items.length}문항`}</div></div>
        ${badge}<div class="chev">›</div></button>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  view.innerHTML=h;
  view.querySelectorAll("[data-subj]").forEach(el=>el.onclick=()=>{
    const s=subjects.find(x=>x.subject===el.dataset.subj); startQuiz(s.items,s.subject);
  });
}

/* ---------- QUIZ ---------- */
let quiz=null;
const QUIZ_N=10;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(pool,label,sample=true){
  let play=shuffle(pool.slice());
  if(sample&&play.length>QUIZ_N)play=play.slice(0,QUIZ_N);
  quiz={source:pool,items:play,label,i:0,correct:0,wrong:[],answered:false,selected:null};
  setTab(null);renderQuiz();
}
function renderQuiz(){
  const q=quiz.items[quiz.i], pct=Math.round((quiz.i+1)/quiz.items.length*100);
  let opts="";
  q.choices.forEach((c,idx)=>{opts+=`<button class="opt" data-i="${idx}"><span class="ob">${idx+1}</span><span style="flex:1">${esc(c)}</span></button>`;});
  view.innerHTML=`<div class="quiz">
    <div class="q-top">
      <div class="q-topbar"><button class="q-back" id="qback">‹</button>
        <div class="q-sub">${esc(quiz.label)}</div>
        <div class="q-prog">${quiz.i+1} / ${quiz.items.length}</div></div>
      <div class="q-bar"><i style="width:${pct}%"></i></div>
    </div>
    <div class="q-body"><div class="q-text">${esc(q.q)}</div><div class="opts" id="opts">${opts}</div></div>
    <div id="fb"></div></div>`;
  document.getElementById("qback").onclick=()=>go("home");
  document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>pick(+b.dataset.i));
}
function pick(idx){
  if(quiz.answered)return;quiz.answered=true;quiz.selected=idx;
  const q=quiz.items[quiz.i], right=q.answer, ok=idx===right;
  document.querySelectorAll(".opt").forEach((b,i)=>{
    if(i===right){b.classList.add("correct");b.querySelector(".ob").textContent="✓";}
    else if(i===idx){b.classList.add("wrong");b.querySelector(".ob").textContent="✕";}
    else b.classList.add("dim");
  });
  if(ok)quiz.correct++;else quiz.wrong.push(q.id);
  const last=quiz.i+1>=quiz.items.length;
  const fb=document.getElementById("fb");
  fb.innerHTML=`<div class="fb">
    <div class="verdict" style="color:${ok?"var(--correct)":"var(--wrong)"}">${ok?"정답이에요":"다시 기억해요"}</div>
    <div class="exp">${esc(q.explain)}</div>
    <div class="src">출처 · ${esc(q.source)}</div>
    <button class="btn" id="next">${last?"채점 결과 보기":"다음 문제"}</button></div>`;
  document.getElementById("next").onclick=()=>{
    if(!last){quiz.i++;quiz.answered=false;quiz.selected=null;renderQuiz();view.scrollTop=0;}else finishQuiz();
  };
  fb.querySelector(".fb").scrollIntoView({behavior:"smooth",block:"end"});
}
function finishQuiz(){
  const pct=Math.round(quiz.correct/quiz.items.length*100);
  const best=bestMap();
  if(best[quiz.label]==null||pct>best[quiz.label]){best[quiz.label]=pct;save(LS_BEST,best);}
  const w=wrongSet();
  quiz.items.forEach(q=>{ if(quiz.wrong.includes(q.id))w.add(q.id); else w.delete(q.id); });
  save(LS_WRONG,[...w]);
  const g=gradeOf(pct), deg=Math.round(pct*3.6), nWrong=quiz.wrong.length;
  view.innerHTML=`<div class="result">
    <div class="r-cap">${esc(quiz.label)} · 채점 완료</div>
    <div class="gauge" style="background:conic-gradient(var(--primary) ${deg}deg, var(--primary-soft) 0deg)">
      <i><div class="sc">${pct}</div><div class="of">/ 100점</div></i></div>
    <div class="${pill(g[2],true)}">${g[1]}</div>
    <div class="r-note">아빠 등급은 재미로 보는 자가점검 결과예요. 공인 자격이 아니에요.</div>
    ${nWrong?`<button class="btn" id="retry">틀린 ${nWrong}문제 다시 풀기</button>`:`<button class="btn" id="retry">한 번 더 풀기</button>`}
    <button class="btn" id="shareRes" style="margin-top:10px">결과 공유하고 도전장 보내기</button>
    <button class="btn ghost" id="other">다른 과목 풀기</button></div>`;
  document.getElementById("retry").onclick=()=>{
    if(nWrong)startQuiz(quiz.items.filter(q=>quiz.wrong.includes(q.id)),quiz.label,false);
    else startQuiz(quiz.source,quiz.label,true);
  };
  document.getElementById("shareRes").onclick=e=>shareResult(e.currentTarget,quiz.label,pct,g);
  document.getElementById("other").onclick=()=>go("home");
}

/* ---------- 오답노트 ---------- */
function renderWrong(){
  const w=wrongSet();
  const items=QS.filter(q=>w.has(q.id));
  let h=`<div class="pad"><div class="pg-title">오답노트</div>`;
  if(!items.length){
    h+=`<div class="empty"><div class="ec">✓</div>
      <div style="margin-top:20px;font-size:17px;font-weight:700">오답노트가 비어 있어요</div>
      <div style="margin-top:8px;font-size:13.5px;line-height:1.6;color:var(--muted)">틀린 문제가 여기에 모여요.<br>지금은 깨끗한 상태예요.</div></div></div>`;
    view.innerHTML=h;return;
  }
  h+=`<div class="pg-sub">틀린 문제를 모아 다시 풀어요.</div>
    <button class="btn" id="all" style="margin-top:16px">오답 전체 다시 풀기 · ${items.length}문제</button>
    <div class="subs" id="list" style="margin-top:16px"></div></div>`;
  view.innerHTML=h;
  document.getElementById("all").onclick=()=>startQuiz(items,"오답 다시 풀기",false);
  const list=document.getElementById("list");
  items.forEach(q=>{
    const d=document.createElement("div");d.className="w-item";
    d.innerHTML=`<div class="w-tag">${esc(q.subject)}</div><div class="w-prev">${esc(q.q)}</div>
      <button class="w-x" data-id="${esc(q.id)}">✕</button>`;
    list.appendChild(d);
  });
  list.querySelectorAll(".w-x").forEach(b=>b.onclick=()=>{
    const s=wrongSet();s.delete(b.dataset.id);save(LS_WRONG,[...s]);renderWrong();
  });
}

/* ---------- 성적표 ---------- */
function renderReport(){
  const best=bestMap();
  const done=subjects.filter(s=>best[s.subject]!=null);
  let h=`<div class="pad"><div class="pg-title">성적표</div>`;
  if(!done.length){
    h+=`<div class="empty"><div class="ec">📊</div>
      <div style="margin-top:20px;font-size:17px;font-weight:700">아직 응시한 과목이 없어요</div>
      <div style="margin-top:8px;font-size:13.5px;line-height:1.6;color:var(--muted)">시험을 풀면 성적표가 채워져요.</div></div></div>`;
    view.innerHTML=h;return;
  }
  const avg=Math.round(done.reduce((a,s)=>a+best[s.subject],0)/done.length);
  const g=gradeOf(avg);
  const now=new Date(), ds=`${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}`;
  h+=`<div class="pg-sub">과목별 최고점과 평균이에요.</div>
    <div class="avg-card"><div><div class="lb">평균 점수</div>
      <div class="big"><b>${avg}</b><span>점</span></div></div>
      <div style="flex:1;display:flex;justify-content:flex-end"><div class="${pill(g[2],false)}">${g[1]}</div></div></div>
    <div class="rp-list">`;
  done.forEach(s=>{const b=best[s.subject];
    h+=`<div class="rp-row"><div class="hd"><span class="n">${esc(s.subject)}</span><span class="s">${b}점</span></div>
      <div class="rp-bar"><i style="width:${b}%"></i></div></div>`;
  });
  h+=`</div>
    <div class="share-lb">공유용 점검 확인 카드</div>
    <div class="share"><div class="brand"><span>🌱</span><span>아빠자격시험</span></div>
      <div class="mid"><div class="big">육아 상식<br>점검 완료</div>
        <div class="meta">${done.length}과목 점검 · 평균 ${avg}점</div>
        <div class="${pill(g[2],false)}" style="margin-top:12px">${g[1]}</div></div>
      <div class="foot">재미로 보는 자가점검이에요. 국가공인 자격이 아니에요. · ${ds}</div></div>
    <button class="btn" id="shareBtn" style="margin-top:14px">이미지로 저장 · 공유</button>
    </div>`;
  view.innerHTML=h;
  const sb=document.getElementById("shareBtn");
  sb.onclick=()=>shareCard(sb,{count:done.length,avg,grade:g,date:ds});
}

/* ---------- 공유 카드 이미지화 ---------- */
function toneColors(t){return t==="gold"?["#F3E7D0","#B8863B"]:t==="primary"?["#E3EFEA","#2F6E5B"]:["#E7DFD3","#857E73"];}
function buildCaptureCard(d){
  const [gbg,gcol]=toneColors(d.grade[2]);
  const w=document.createElement("div");
  w.style.cssText="position:fixed;left:-9999px;top:0;width:720px;height:720px;box-sizing:border-box;padding:60px;"
    +"background:#FFFFFF;border-radius:44px;display:flex;flex-direction:column;"
    +"font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;";
  w.innerHTML=`<div style="display:flex;align-items:center;gap:12px">
      <div style="width:26px;height:26px;border-radius:9px;background:#2F6E5B"></div>
      <div style="font-size:24px;font-weight:800;color:#2F6E5B;letter-spacing:-.3px">아빠자격시험</div></div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
      <div style="font-size:60px;font-weight:800;letter-spacing:-1.5px;line-height:1.25;color:#33302B">육아 상식<br>점검 완료</div>
      <div style="margin-top:30px;font-size:27px;color:#857E73">${d.count}과목 점검 · 평균 ${d.avg}점</div>
      <div style="align-self:flex-start;margin-top:24px;padding:13px 32px;border-radius:99px;font-size:29px;font-weight:800;background:${gbg};color:${gcol}">${d.grade[1]}</div></div>
    <div style="font-size:19px;line-height:1.5;color:#857E73">재미로 보는 자가점검이에요. 국가공인 자격이 아니에요. · ${d.date}</div>`;
  return w;
}
async function shareBlob(blob){
  const file=new File([blob],"아빠자격시험.png",{type:"image/png"});
  try{
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"아빠자격시험",text:"육아 상식 점검 완료"});return;
    }
  }catch(e){ if(e&&e.name==="AbortError")return; }
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="아빠자격시험.png";
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function shareCard(btn,d){
  if(!window.html2canvas){alert("이미지 생성 모듈을 불러오지 못했어요.");return;}
  const orig=btn.textContent;btn.disabled=true;btn.textContent="이미지 만드는 중…";
  const node=buildCaptureCard(d);document.body.appendChild(node);
  try{
    const canvas=await html2canvas(node,{scale:2,backgroundColor:null,logging:false});
    await new Promise(res=>canvas.toBlob(async b=>{await shareBlob(b);res();},"image/png"));
  }catch(e){ alert("이미지를 만들지 못했어요."); }
  finally{ node.remove();btn.disabled=false;btn.textContent=orig; }
}

/* ---------- 결과 공유 + 도전장 URL ---------- */
function buildResultCard(d){
  const [gbg,gcol]=toneColors(d.grade[2]);
  const w=document.createElement("div");
  w.style.cssText="position:fixed;left:-9999px;top:0;width:720px;height:720px;box-sizing:border-box;padding:60px;"
    +"background:#FFFFFF;border-radius:44px;display:flex;flex-direction:column;"
    +"font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;";
  w.innerHTML=`<div style="display:flex;align-items:center;gap:12px">
      <div style="width:26px;height:26px;border-radius:9px;background:#2F6E5B"></div>
      <div style="font-size:24px;font-weight:800;color:#2F6E5B;letter-spacing:-.3px">아빠자격시험</div></div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
      <div style="font-size:28px;color:#857E73">${esc(d.subject)}</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-top:10px">
        <div style="font-size:96px;font-weight:800;letter-spacing:-3px;line-height:1;color:#33302B">${d.pct}</div>
        <div style="font-size:30px;font-weight:700;color:#857E73">점</div></div>
      <div style="align-self:flex-start;margin-top:22px;padding:13px 32px;border-radius:99px;font-size:29px;font-weight:800;background:${gbg};color:${gcol}">${d.grade[1]}</div>
      <div style="margin-top:30px;font-size:26px;font-weight:700;color:#2F6E5B">너도 도전해봐 →</div></div>
    <div style="font-size:19px;line-height:1.5;color:#857E73">재미로 보는 자가점검이에요. 국가공인 자격이 아니에요. · ${d.date}</div>`;
  return w;
}
async function shareResult(btn,subject,pct,grade){
  const now=new Date(), date=`${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}`;
  const url=SHARE_BASE+"?ch="+encodeURIComponent(subject)+"&sc="+pct;
  const text=`아빠자격시험 '${subject}' ${pct}점 (${grade[1]}) — 너도 도전해봐!`;
  const orig=btn.textContent;btn.disabled=true;btn.textContent="이미지 만드는 중…";
  let file=null;
  if(window.html2canvas){
    const node=buildResultCard({subject,pct,grade,date});document.body.appendChild(node);
    try{
      const canvas=await html2canvas(node,{scale:2,backgroundColor:null,logging:false});
      const blob=await new Promise(res=>canvas.toBlob(res,"image/png"));
      if(blob)file=new File([blob],"아빠자격시험.png",{type:"image/png"});
    }catch(e){}
    finally{ node.remove(); }
  }
  try{
    if(file&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"아빠자격시험",text,url});
    }else if(navigator.share){
      await navigator.share({title:"아빠자격시험",text,url});
    }else{
      if(file){const u=URL.createObjectURL(file);const a=document.createElement("a");a.href=u;a.download="아빠자격시험.png";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000);}
      try{await navigator.clipboard.writeText(url);alert("도전장 링크를 복사했어요.\n"+url);}catch(e){prompt("도전장 링크",url);}
    }
  }catch(e){ if(!(e&&e.name==="AbortError")){ try{await navigator.clipboard.writeText(url);}catch(_){} } }
  finally{ btn.disabled=false;btn.textContent=orig; }
}

/* ---------- 도전장 받은 화면 ---------- */
function renderChallenge(subject,pct){
  history.replaceState(null,"",location.pathname); // URL 정리(새로고침 재트리거 방지)
  const s=subjects.find(x=>x.subject===subject);
  const g=(pct!=null)?gradeOf(pct):null;
  setTab(null);
  view.innerHTML=`<div class="result">
    <div class="r-cap">🌱 아빠자격시험 · 받은 도전장</div>
    <div class="gauge" style="margin-top:28px;background:conic-gradient(var(--primary) ${pct!=null?Math.round(pct*3.6):360}deg, var(--primary-soft) 0deg)">
      <i>${pct!=null?`<div class="sc">${pct}</div><div class="of">/ 100점</div>`:`<div class="of" style="font-size:15px;font-weight:700;color:var(--primary)">도전!</div>`}</i></div>
    ${g?`<div class="${pill(g[2],true)}">친구는 ${g[1]}</div>`:""}
    <div class="r-note" style="margin-top:18px;font-size:14px;color:var(--ink)">친구가 <b>‘${esc(subject)}’</b> 시험에서${pct!=null?` ${pct}점을 받았어요.`:" 도전했어요."}<br>나도 같은 시험을 풀어볼까요?</div>
    <button class="btn" id="chGo" style="margin-top:24px">나도 이 과목 도전하기</button>
    <button class="btn ghost" id="chHome">처음부터 둘러보기</button></div>`;
  document.getElementById("chGo").onclick=()=>startQuiz(s.items,s.subject);
  document.getElementById("chHome").onclick=()=>go("home");
}

init();
</script>
