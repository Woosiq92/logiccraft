  .badge.top{background:var(--honey-soft);color:var(--honey-ink)}
  .chev{color:var(--faint);font-size:19px;flex:0 0 auto}

  /* ---- quiz workspace ---- */
  .quiz{padding:6px 2px}
  .q-main{min-width:0}
  .q-top{display:flex;align-items:center;gap:14px;padding:6px 0 0}
  .icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font-size:19px;line-height:1;flex:0 0 auto}
  .q-meta{flex:1;min-width:0}
  .q-meta .s{font-size:14px;font-weight:700;letter-spacing:-.2px}
  .q-meta .p{font-size:11.5px;color:var(--muted);font-family:var(--mono);margin-top:1px}
  .q-count{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums}
  .q-bar{height:5px;border-radius:99px;background:var(--line-soft);overflow:hidden}
  .q-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pine),var(--pine-deep));transition:width .3s ease}
  .q-progm{margin-top:16px}
  .q-rail{display:none;flex-direction:column;gap:12px;position:sticky;top:18px}
  .rail-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;box-shadow:var(--shadow)}
  .rail-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .rail-count{margin-top:6px;font-size:15px;color:var(--muted);font-variant-numeric:tabular-nums}

  .rail-card .q-bar{margin-top:11px}

  .dot{width:16px;height:16px;border-radius:50%;background:var(--line);border:1.5px solid var(--line);display:grid;place-items:center;font-size:9px;font-weight:900;color:#fff;line-height:1}
  .dot.cur{background:var(--card);border-color:var(--pine);box-shadow:0 0 0 3px var(--pine-soft)}

  .rail-score .ok{color:var(--correct)} .rail-score .no{color:var(--wrong)} .rail-score .sep{color:var(--faint);font-weight:400;margin:0 6px}
  .rail-subname{margin-top:6px;font-size:14.5px;font-weight:700;letter-spacing:-.2px;line-height:1.35}

  .opts{display:flex;flex-direction:column;gap:11px;margin-top:22px}

    border:1.5px solid var(--line);background:var(--paper);color:var(--ink);font-size:15.5px;line-height:1.4;
    min-height:56px;transition:border-color .14s, background .14s;width:100%}

  .opt.wrong{border-color:var(--wrong);background:var(--wrong-soft)}
  .opt.wrong .ob{border:none;color:#fff;background:var(--wrong)}

  .opt:disabled{cursor:default}

  .fb{margin-top:16px;border-radius:var(--r);border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow);animation:rise .22s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

    font-family:var(--mono);padding:5px 10px;border-radius:8px;background:var(--paper);border:1px solid var(--line)}
  .cta{display:block;width:100%;padding:16px;border:none;border-radius:15px;background:var(--pine);color:#fff;

  .gauge{position:relative;width:210px;height:210px;margin:24px auto 0}
  .gauge svg{transform:rotate(-90deg);display:block}
  .gauge .in{position:absolute;inset:0;display:grid;place-items:center;flex-direction:column}
  .gauge .sc{font-size:58px;font-weight:800;line-height:1;letter-spacing:-2px;font-variant-numeric:tabular-nums}
  .gauge .of{font-size:13px;color:var(--muted);margin-top:3px;font-family:var(--mono)}

  .cgrp-h.gap{color:var(--honey-ink)} .cgrp-h.done{color:var(--pine-ink)}

<script>
const STAGES=[
  {key:"prep",name:"예비 아빠",ico:"🤰"},
  {key:"newborn",name:"신생아 · 0~100일",ico:"👶"},
  {key:"baby",name:"영유아 · 100일~돌",ico:"🍼"},
  {key:"safety",name:"안전 · 사고 예방",ico:"🚨"},
  {key:"sick",name:"아플 때 · 판단",ico:"🌡️"},
  {key:"dad",name:"아빠의 자리",ico:"🧔"},
  {key:"admin",name:"제도 · 지원",ico:"📋"},
  {key:"common",name:"공통 · 육아 용어",ico:"📖"}];
const GRADES=[[90,"마스터 아빠","gold"],[75,"베테랑 아빠","pine"],[60,"주니어 아빠","pine"],[40,"수습 아빠","muted"],[0,"인턴 아빠","muted"]];
const LS_BEST="dadexam.best", LS_WRONG="dadexam.wrong", LS_THEME="dadexam.theme";
const LS_LAST="dadexam.last", LS_SEEN="dadexam.seen", LS_TRIES="dadexam.tries", LS_PARTNER="dadexam.partner", LS_COVERED="dadexam.covered";
const SHARE_BASE="https://logiccraft.co.kr/dadexam/";
const QUIZ_N=10;
const view=document.getElementById("view");
let QS=[], subjects=[], CANON=[], mem={best:{},wrong:[],last:{},seen:{},tries:{},partner:null,covered:{}};
try{ mem.best=JSON.parse(localStorage.getItem(LS_BEST))||{}; mem.wrong=JSON.parse(localStorage.getItem(LS_WRONG))||[];
  mem.last=JSON.parse(localStorage.getItem(LS_LAST))||{}; mem.seen=JSON.parse(localStorage.getItem(LS_SEEN))||{}; mem.tries=JSON.parse(localStorage.getItem(LS_TRIES))||{};
  mem.partner=JSON.parse(localStorage.getItem(LS_PARTNER))||null; mem.covered=JSON.parse(localStorage.getItem(LS_COVERED))||{}; }catch(e){}
const saveBest=()=>{try{localStorage.setItem(LS_BEST,JSON.stringify(mem.best))}catch(e){}};
const saveWrong=()=>{try{localStorage.setItem(LS_WRONG,JSON.stringify(mem.wrong))}catch(e){}};
const saveLast=()=>{try{localStorage.setItem(LS_LAST,JSON.stringify(mem.last));localStorage.setItem(LS_TRIES,JSON.stringify(mem.tries));}catch(e){}};
const saveSeen=()=>{try{localStorage.setItem(LS_SEEN,JSON.stringify(mem.seen));localStorage.setItem(LS_COVERED,JSON.stringify(mem.covered));}catch(e){}};
const savePartner=()=>{try{mem.partner?localStorage.setItem(LS_PARTNER,JSON.stringify(mem.partner)):localStorage.removeItem(LS_PARTNER)}catch(e){}};
/* 부부 공동 준비 — 커버리지를 URL로 주고받음(과목당 1글자: 0=미응시, 1~5=점검 강도) */
const covBand=name=>{const b=mem.best[name];return b==null?0:Math.max(1,Math.ceil(b/20));};
const encodeCov=()=>CANON.map(covBand).join("");
const decodeCov=str=>{const o={};String(str||"").split("").forEach((c,i)=>{if(CANON[i])o[CANON[i]]=Math.min(5,parseInt(c,10)||0);});return o;};
const coupleBuckets=theirs=>{const both=[],one=[],none=[];CANON.forEach(name=>{const m=covBand(name),t=theirs[name]||0;
  if(m>0&&t>0)both.push(name);else if(m>0||t>0)one.push({name,me:m>0});else none.push(name);});return{both,one,none};};
const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const gradeOf=p=>GRADES.find(g=>p>=g[0]);
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
/* 보기 순서 섞기 — 정답이 늘 1번에 오는 걸 막는다. O/X(2지)는 순서가 의미라 그대로 둔다. */
const shuffleChoices=q=>{
  if(!q||!q.choices||q.choices.length!==4)return q;
  const order=shuffle(q.choices.map((_,i)=>i));
  return {...q, choices:order.map(i=>q.choices[i]), answer:order.indexOf(q.answer)};
};

/* theme toggle (persisted) */
document.querySelectorAll(".themebtn").forEach(btn=>btn.onclick=()=>{
  const cur=document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  const next=cur==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  try{localStorage.setItem(LS_THEME,next);}catch(e){}
});

/* nav — 사이드바(데스크톱)는 상시 노출, 하단 탭바(모바일)만 집중화면에서 숨김 */
function setTab(t){document.querySelectorAll("[data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===t));
  document.querySelector(".tabbar").style.visibility=t?"":"hidden";}
function go(t){setTab(t);({home:renderHome,wrong:renderWrong,report:renderReport}[t])();window.scrollTo(0,0);}

async function init(){
  try{ QS=await (await fetch("./data/questions.json")).json(); }
  catch(e){ view.innerHTML='<div class="empty" style="padding-top:100px">문항을 불러오지 못했어요.</div>'; return; }
  const seen={};
  QS.forEach(q=>{const k=q.stage+"|"+q.subject; if(!seen[k])seen[k]={stage:q.stage,subject:q.subject,items:[]}; seen[k].items.push(q);});
  subjects=Object.values(seen);
  CANON=subjects.map(s=>s.subject).sort();
  // 문항 데이터가 바뀌어 사라진 오답 id 정리 (홈 오답 카운트와 오답노트 표시 일치)
  const qids=new Set(QS.map(q=>q.id));
  const cleanWrong=mem.wrong.filter(id=>qids.has(id));
  if(cleanWrong.length!==mem.wrong.length){mem.wrong=cleanWrong;saveWrong();}
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>go(b.dataset.tab));
  const p=new URLSearchParams(location.search), ch=p.get("ch"), sc=parseInt(p.get("sc"),10), qid=p.get("q");
  const cov=p.get("cov"), cpl=p.get("couple");
  if(cov) renderCouple(cpl?decodeURIComponent(cpl):"", cov);
  else if(ch && subjects.some(s=>s.subject===ch)) renderChallenge(ch, isFinite(sc)?sc:null, qid);
  else go("home");
}

/* ---------- HOME ---------- */
function renderHome(){
  const best=mem.best, done=subjects.filter(s=>best[s.subject]!=null);
  const avg=done.length?Math.round(done.reduce((a,s)=>a+best[s.subject],0)/done.length):null;
  let h=`<section class="mast">
    <div class="kicker">예비·초보 아빠 · 육아 상식 자가점검</div>
    <h1>나는 몇 점짜리 아빠일까?</h1>
    <p class="tag">예비·초보 아빠 육아 상식을 시험으로 점검하고 등급을 받아요. 임신·출산·신생아 15과목, 틀린 문제는 근거와 함께.</p>
    <div class="disc"><span>🌱</span><span><b>재미로 보는 자가점검이에요.</b> 국가공인 자격이 아니고, 의료 조언을 대신하지 않아요.</span></div>`;
  if(avg!=null){const g=gradeOf(avg);
    h+=`<div class="prog"><div class="ring"><svg width="56" height="56"><circle cx="28" cy="28" r="24" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="5"/><circle cx="28" cy="28" r="24" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-dasharray="${(2*Math.PI*24).toFixed(1)}" stroke-dashoffset="${(2*Math.PI*24*(1-avg/100)).toFixed(1)}" transform="rotate(-90 28 28)"/></svg><i>${avg}</i></div>
      <div><div class="pt">지금까지 평균</div><div class="pv"><b>${done.length}</b>과목 점검 · <b>${g[1]}</b></div></div></div>`;
  }
  h+=`</section>`;
  // 재방문자 = 학습 이어가기 표면(A). 첫 방문자는 깔끔한 시험 진입(B)만.
  const isReturning=done.length>0||Object.keys(mem.tries||{}).length>0;
  if(isReturning){
    const wrongN=mem.wrong.length;
    const nextSub=subjects.find(s=>best[s.subject]==null)
      ||done.slice().sort((a,b)=>best[a.subject]-best[b.subject])[0];
    h+=`<section class="cont"><div class="cont-h">이어서 하기</div><div class="cont-row">`;
    if(wrongN)h+=`<button class="cont-card" id="cReview"><span class="cc-ic">📕</span><span class="cc-t">오답 ${wrongN}개 복습</span><span class="cc-s">틀린 문제만 모아 다시</span></button>`;
    if(nextSub)h+=`<button class="cont-card" id="cNext"><span class="cc-ic">▶</span><span class="cc-t">${esc(nextSub.subject)}</span><span class="cc-s">${best[nextSub.subject]==null?"아직 안 푼 과목":`최고 ${best[nextSub.subject]}점 · 다시 도전`}</span></button>`;
    h+=`</div>`;
    if(mem.partner&&mem.partner.cov){

/* ---------- QUIZ ---------- */
let quiz=null;
function startQuiz(pool,label,sample=true){
  let play;
  if(sample&&pool.length>QUIZ_N){
    // 아직 안 나온 문항을 먼저 출제 → 여러 번 풀면 전 문항을 고루 접함
    let seen=new Set(mem.seen[label]||[]);
    const unseen=shuffle(pool.filter(q=>!seen.has(q.id)));
    if(unseen.length>=QUIZ_N){
      play=unseen.slice(0,QUIZ_N);
    }else{
      // 남은 미출제부터 채우고 나머지는 새 사이클에서 → seen 리셋
      // 이 지점에 온다는 건 이번 판으로 전 문항을 한 번씩 다 접했다는 뜻
      play=unseen.concat(shuffle(pool.filter(q=>seen.has(q.id)))).slice(0,QUIZ_N);
      seen=new Set();
      if(subjects.some(s=>s.subject===label))mem.covered[label]=true;
    }
    play.forEach(q=>seen.add(q.id));
    mem.seen[label]=[...seen]; saveSeen();
  }else{
    play=shuffle(pool.slice());
  }
  play=play.map(shuffleChoices);
  quiz={source:pool,items:play,label,i:0,correct:0,wrong:[],results:[],answered:false};
  setTab(null);renderQuiz();window.scrollTo(0,0);
}
function railDots(){
  return quiz.items.map((_,idx)=>{
    let cls="dot", gl="";
    if(idx<quiz.results.length){const r=quiz.results[idx];cls+=" "+r;gl=r==="ok"?"✓":"✕";}
    else if(idx===quiz.i) cls+=" cur";
    return `<span class="${cls}">${gl}</span>`;
  }).join("");
}
function railScore(){
  const ans=quiz.results.length, ok=quiz.results.filter(r=>r==="ok").length;
  if(!ans) return `<span style="color:var(--muted);font-weight:400">아직 없음</span>`;
  return `<span class="ok">정답 ${ok}</span><span class="sep">·</span><span class="no">오답 ${ans-ok}</span>`;
}
function renderQuiz(){
  const q=quiz.items[quiz.i], n=quiz.items.length, pct=Math.round((quiz.i+1)/n*100);
  const stageName=(STAGES.find(s=>s.key===q.stage)||{}).name||"";
  view.innerHTML=`<section class="quiz">
    <div class="q-main">
      <div class="q-top"><button class="icon-btn" id="qback" aria-label="뒤로">‹</button>
        <div class="q-meta"><div class="s">${esc(quiz.label)}</div><div class="p">즉시 채점 · 근거 해설</div></div>
        <div class="q-count">${quiz.i+1} / ${n}</div></div>
      <div class="q-bar q-progm"><i style="width:${pct}%"></i></div>
      <div class="q-card"><div class="q-text">${esc(q.q)}</div>
        <div class="opts" id="opts">${q.choices.map((c,idx)=>`<button class="opt" data-i="${idx}"><span class="ob">${idx+1}</span><span style="flex:1">${esc(c)}</span></button>`).join("")}</div>
      </div><div id="fb"></div>
    </div>
    <aside class="q-rail">
      <div class="rail-card"><div class="rail-label">진행</div>
        <div class="rail-count"><b>${quiz.i+1}</b> / ${n}</div>
        <div class="q-bar"><i style="width:${pct}%"></i></div>
        <div class="rail-dots" id="railDots">${railDots()}</div></div>
      <div class="rail-card"><div class="rail-label">지금까지</div>
        <div class="rail-score" id="railScore">${railScore()}</div></div>
      <div class="rail-card"><div class="rail-label">과목</div>
        <div class="rail-subname">${esc(quiz.label)}</div>
        <div class="rail-subnote">${esc(stageName)}${stageName?" · ":""}${quiz.source.length}문항</div></div>
    </aside></section>`;
  document.getElementById("qback").onclick=()=>go("home");
  document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>pick(+b.dataset.i));
}
function pick(idx){
  if(quiz.answered)return;quiz.answered=true;
  const q=quiz.items[quiz.i], right=q.answer, ok=idx===right;
  document.querySelectorAll(".opt").forEach((b,i)=>{b.disabled=true;
    if(i===right){b.classList.add("correct");b.querySelector(".ob").textContent="✓";}
    else if(i===idx){b.classList.add("wrong");b.querySelector(".ob").textContent="✕";}
    else b.classList.add("dim");});
  if(ok)quiz.correct++;else quiz.wrong.push(q.id);
  quiz.results[quiz.i]=ok?"ok":"no";
  const rd=document.getElementById("railDots");if(rd)rd.innerHTML=railDots();
  const rs=document.getElementById("railScore");if(rs)rs.innerHTML=railScore();
  const last=quiz.i+1>=quiz.items.length;
  document.getElementById("fb").innerHTML=`<div class="fb ${ok?"ok":"no"}">
    <div class="hd">${ok?"✓ 정답이에요":"✕ 다시 기억해요"}</div>
    <div class="bd"><div class="exp">${esc(q.explain)}</div><div class="src">📎 ${esc(q.source)}</div>
      <div class="stack"><button class="cta" id="next">${last?"채점 결과 보기":"다음 문제"}</button></div></div></div>`;
  document.getElementById("next").onclick=()=>{if(!last){quiz.i++;quiz.answered=false;renderQuiz();window.scrollTo(0,0);}else finishQuiz();};
  document.getElementById("fb").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function finishQuiz(){
  const pct=Math.round(quiz.correct/quiz.items.length*100), g=gradeOf(pct), nWrong=quiz.wrong.length;
  const isSubject=subjects.some(s=>s.subject===quiz.label);
  const prevBest=mem.best[quiz.label];
  const isNewBest=prevBest==null||pct>prevBest;
  if(isNewBest){mem.best[quiz.label]=pct;saveBest();}
  if(isSubject){mem.last[quiz.label]=pct;mem.tries[quiz.label]=(mem.tries[quiz.label]||0)+1;saveLast();}
  const w=new Set(mem.wrong);quiz.items.forEach(q=>{if(quiz.wrong.includes(q.id))w.add(q.id);else w.delete(q.id);});mem.wrong=[...w];saveWrong();
  // 오늘 새로 알게 된 것 = 이번에 틀린 문제의 핵심 (결과의 진짜 주인공)
  const learned=quiz.items.filter(q=>quiz.wrong.includes(q.id));
  const learnHtml = learned.length
    ? `<div class="learned"><div class="learned-h">🌱 오늘 새로 알게 된 것</div>${learned.slice(0,3).map(q=>`<div class="learned-i"><div class="li-q">${esc(q.q)}</div><div class="li-a">${esc(q.explain)}</div></div>`).join("")}${learned.length>3?`<div class="learned-more">외 ${learned.length-3}가지는 오답노트에 담아뒀어요</div>`:""}</div>`
    : `<div class="learned solid"><div class="learned-h">✓ 이미 탄탄한 부분이에요</div><div class="learned-i"><div class="li-a">이 과목은 전부 맞혔어요. 다른 과목도 점검해볼까요?</div></div></div>`;
  // 결과 CTA — 혼자 쓰는 사람은 '다음 과목'으로 학습을 잇고, 상대가 있으면 '되보내기'를 앞세움
  const hasPartner=!!(mem.partner&&mem.partner.cov);
  const nextS=subjects.find(s=>mem.best[s.subject]==null&&s.subject!==quiz.label)
    ||subjects.filter(s=>s.subject!==quiz.label).sort((a,b)=>(mem.best[a.subject]==null?0:mem.best[a.subject])-(mem.best[b.subject]==null?0:mem.best[b.subject]))[0];
  const primaryBtn = hasPartner
    ? `<button class="cta honey" id="couple">우리 준비도 되보내기</button>`
    : nextS ? `<button class="cta honey" id="nextsub">다음 과목 · ${esc(nextS.subject)}</button>`
    : `<button class="cta honey" id="couple">아내·남편과 함께 준비하기</button>`;
  const R=94, C=2*Math.PI*R;
  view.innerHTML=`<section class="result">
    <div class="r-kick">채점 완료</div><div class="r-sub">${esc(quiz.label)}</div>
    <div class="gauge"><svg width="210" height="210" viewBox="0 0 210 210">
      <circle cx="105" cy="105" r="${R}" fill="none" stroke="var(--line-soft)" stroke-width="14"/>
      <circle cx="105" cy="105" r="${R}" fill="none" stroke="var(--pine)" stroke-width="14" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${(C*(1-pct/100)).toFixed(1)}"/>
    </svg><div class="in"><div class="sc">${pct}</div><div class="of">/ 100점</div></div></div>
    <div class="seal ${g[2]}"><span class="st">${g[2]==="gold"?"★":"●"}</span>${g[1]}</div>
    ${isSubject?`<div class="r-record">${isNewBest?(prevBest==null?"첫 응시 기록이에요 🌱":`새 최고 기록! (이전 ${prevBest}점)`):`이번 ${pct}점 · 최고 ${mem.best[quiz.label]}점 유지 · ${mem.tries[quiz.label]}회째`}</div>`:""}
    ${learnHtml}
    <div class="r-note">아빠 등급은 재미로 보는 자가점검 결과예요. 공인 자격이 아니에요.</div>
    <div class="stack">
      ${primaryBtn}
      <button class="cta" id="retry">${nWrong?`틀린 ${nWrong}문제 다시 풀기`:"한 번 더 풀기"}</button>
      <button class="cta ghost" id="other">다른 과목 풀기</button></div></section>`;
  document.getElementById("retry").onclick=()=>{
    if(nWrong)startQuiz(quiz.items.filter(q=>quiz.wrong.includes(q.id)),quiz.label,false);
    else startQuiz(quiz.source,quiz.label,true);
  };
  const nb=document.getElementById("nextsub");
  if(nb&&nextS)nb.onclick=()=>startQuiz(nextS.items,nextS.subject);
  const cpb=document.getElementById("couple");
  if(cpb)cpb.onclick=e=>shareCouple(e.currentTarget);
  document.getElementById("other").onclick=()=>go("home");
}

        else if(i===idx){el.classList.add("wrong");el.querySelector(".ob").textContent="✕";}
        else el.classList.add("dim");});
      document.getElementById("teaseFb").innerHTML=`<div class="tease-fb ${ok?"ok":"no"}"><b>${ok?"✓ 정답이에요":"✕ 아쉬워요"}</b><div class="exp">${esc(tease.explain)}</div><div class="src">📎 ${esc(tease.source)}</div></div>`;
    });
  }
}

/* ---------- COUPLE (부부 공동 준비) ---------- */
function stageIco(name){const s=subjects.find(x=>x.subject===name);return (STAGES.find(st=>st.key===(s||{}).stage)||{}).ico||"•";}
function mergedRowsHtml(theirs,theirLabel){
  const {both,one,none}=coupleBuckets(theirs);
  const dot=(on,band)=>on?`<span class="cdot on" style="opacity:${0.5+0.1*band}"></span>`:`<span class="cdot"></span>`;
  const row=name=>{const m=covBand(name),t=theirs[name]||0;
    return `<div class="crow"><span class="cico">${stageIco(name)}</span><span class="cn">${esc(name)}</span>
      <span class="cst"><span class="cst-l">나</span>${dot(m>0,m)}</span>
      <span class="cst"><span class="cst-l">${esc(theirLabel)}</span>${dot(t>0,t)}</span></div>`;};
  let h="";
  if(none.length)h+=`<div class="cgrp-h gap">둘 다 아직 · ${none.length}과목</div>`+none.map(row).join("");
  if(one.length)h+=`<div class="cgrp-h">한 사람만 · ${one.length}과목</div>`+one.map(o=>row(o.name)).join("");
  if(both.length)h+=`<div class="cgrp-h done">둘 다 점검 · ${both.length}과목</div>`+both.map(row).join("");
  return h;
}
function renderCouple(name,covStr){
  history.replaceState(null,"",location.pathname);
  const theirs=decodeCov(covStr);
  mem.partner={name:name||"",cov:covStr}; savePartner();
  const theirLabel=name?esc(name):"상대";
  const {both,one,none}=coupleBuckets(theirs);
  const total=CANON.length;
  setTab(null);
  view.innerHTML=`<section class="couple">
    <div class="chal-top"><button class="icon-btn" id="cback" aria-label="닫기">‹</button></div>
    <div class="env">🌱 함께 준비</div>
    <h2 class="couple-h">${name?`${esc(name)}님이<br>함께 준비하자고 보냈어요`:"함께 준비 초대가 왔어요"}</h2>
    <div class="couple-sub">둘의 기록을 합친 <b>우리 준비도</b>예요. 빈칸을 같이 채워요.</div>
    <div class="cmetric"><div class="cm"><b>${both.length}</b><span>함께 점검</span></div>
      <div class="cm"><b>${one.length}</b><span>한 사람만</span></div>
      <div class="cm gap"><b>${none.length}</b><span>둘 다 아직</span></div></div>
    <div class="crows">${mergedRowsHtml(theirs,theirLabel)}</div>
    <div class="stack" style="margin-top:22px">
      <button class="cta honey" id="cgap">${none.length?"둘 다 안 본 과목부터 풀기":one.length?"한 사람만 본 과목 풀기":"우리 준비도 다시 보기"}</button>
      <button class="cta" id="csend">우리 준비도 되보내기</button>
      <button class="cta ghost" id="chome">전체 과목 둘러보기</button></div>
    <div class="couple-foot">${both.length}/${total}과목을 함께 점검했어요.</div></section>`;
  document.getElementById("cback").onclick=()=>go("home");
  document.getElementById("chome").onclick=()=>go("home");
  document.getElementById("csend").onclick=e=>shareCouple(e.currentTarget);
  document.getElementById("cgap").onclick=()=>{
    const target=none[0]||(one.find(o=>!o.me)||{}).name||one[0]&&one[0].name;
    const s=target?subjects.find(x=>x.subject===target):null;
    if(s)startQuiz(s.items,s.subject); else go("home");
  };
}
async function shareCouple(btn){
  const cov=encodeCov();
  const url=SHARE_BASE+"?couple=&cov="+cov;
  const text="아빠자격시험 — 우리 함께 육아 준비해요. 내 준비 현황을 보냈어요. 열어서 우리 준비도를 같이 봐요!";
  const orig=btn.textContent;btn.disabled=true;btn.textContent="링크 준비 중…";
  try{
    if(navigator.share){ await navigator.share({title:"아빠자격시험 · 함께 준비",text,url}); }
    else{ try{await navigator.clipboard.writeText(url);alert("함께 준비 링크를 복사했어요.\n"+url);}catch(e){prompt("함께 준비 링크",url);} }
  }catch(e){ if(!(e&&e.name==="AbortError")){ try{await navigator.clipboard.writeText(url);}catch(_){} } }
  finally{ btn.disabled=false;btn.textContent=orig; }
}

/* ---------- 공유 카드 이미지화 (html2canvas) ---------- */
function toneColors(t){return t==="gold"?["#F4E6CB","#8A5E1E"]:t==="pine"?["#E2EDE7","#234F42"]:["#EAE0CF","#8A8073"];}
function buildCaptureCard(d){
  const [gbg,gcol]=toneColors(d.grade[2]);
  const w=document.createElement("div");
  w.style.cssText="position:fixed;left:-9999px;top:0;width:720px;height:720px;box-sizing:border-box;padding:60px;"
    +"background:#FFFDF9;border-radius:44px;display:flex;flex-direction:column;"
    +"font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;";
  w.innerHTML=`<div style="display:flex;align-items:center;gap:12px">
      <div style="width:26px;height:26px;border-radius:9px;background:#2F6E5B"></div>
      <div style="font-size:24px;font-weight:800;color:#2F6E5B;letter-spacing:-.3px">아빠자격시험</div></div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
      <div style="font-size:60px;font-weight:800;letter-spacing:-1.5px;line-height:1.25;color:#26231E">육아 상식<br>점검 완료</div>
      <div style="margin-top:30px;font-size:27px;color:#8A8073">${d.count}과목 점검 · 평균 ${d.avg}점</div>
      <div style="align-self:flex-start;margin-top:24px;padding:13px 32px;border-radius:99px;font-size:29px;font-weight:800;background:${gbg};color:${gcol}">${d.grade[1]}</div></div>
    <div style="font-size:19px;line-height:1.5;color:#8A8073">재미로 보는 자가점검이에요. 국가공인 자격이 아니에요. · ${d.date}</div>`;
  return w;
}
function buildResultCard(d){
  const [gbg,gcol]=toneColors(d.grade[2]);
  const w=document.createElement("div");
  w.style.cssText="position:fixed;left:-9999px;top:0;width:720px;height:720px;box-sizing:border-box;padding:60px;"
    +"background:#FFFDF9;border-radius:44px;display:flex;flex-direction:column;"
    +"font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;";
  w.innerHTML=`<div style="display:flex;align-items:center;gap:12px">
      <div style="width:26px;height:26px;border-radius:9px;background:#2F6E5B"></div>
      <div style="font-size:24px;font-weight:800;color:#2F6E5B;letter-spacing:-.3px">아빠자격시험</div></div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
      <div style="font-size:28px;color:#8A8073">${esc(d.subject)}</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-top:10px">
        <div style="font-size:96px;font-weight:800;letter-spacing:-3px;line-height:1;color:#26231E">${d.pct}</div>
        <div style="font-size:30px;font-weight:700;color:#8A8073">점</div></div>
      <div style="align-self:flex-start;margin-top:22px;padding:13px 32px;border-radius:99px;font-size:29px;font-weight:800;background:${gbg};color:${gcol}">${d.grade[1]}</div>
      ${d.tease?`<div style="margin-top:28px;padding:22px 24px;border-radius:24px;background:#FBF3E3">
        <div style="font-size:20px;font-weight:800;color:#C0842F">이 문제, 너는 풀 수 있어?</div>
        <div style="margin-top:10px;font-size:23px;font-weight:700;line-height:1.4;color:#26231E">${esc(d.tease)}</div></div>`
      :`<div style="margin-top:30px;font-size:26px;font-weight:700;color:#C0842F">너도 도전해봐 →</div>`}</div>
    <div style="font-size:19px;line-height:1.5;color:#8A8073">재미로 보는 자가점검이에요. 국가공인 자격이 아니에요. · ${d.date}</div>`;
  return w;
}
async function shareBlob(blob){
  const file=new File([blob],"아빠자격시험.png",{type:"image/png"});
  try{
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"아빠자격시험",text:"육아 상식 점검 완료"});return;
    }
  }catch(e){ if(e&&e.name==="AbortError")return; }
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="아빠자격시험.png";
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function shareCard(btn,d){
  if(!window.html2canvas){alert("이미지 생성 모듈을 불러오지 못했어요.");return;}
  const orig=btn.textContent;btn.disabled=true;btn.textContent="이미지 만드는 중…";
  const node=buildCaptureCard(d);document.body.appendChild(node);
  try{
    const canvas=await html2canvas(node,{scale:2,backgroundColor:null,logging:false});
    await new Promise(res=>canvas.toBlob(async b=>{await shareBlob(b);res();},"image/png"));
  }catch(e){ alert("이미지를 만들지 못했어요."); }
  finally{ node.remove();btn.disabled=false;btn.textContent=orig; }
}
async function shareResult(btn,subject,pct,grade){
  const now=new Date(), date=`${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}`;
  // 도전장에 진짜 문제 1개를 실어 보냄 — 내가 틀린 문제 우선(정직·개인적), 없으면 중간 문항
  const teaseId=(quiz&&quiz.wrong&&quiz.wrong.length)?quiz.wrong[0]
    :(quiz&&quiz.items&&quiz.items.length)?quiz.items[Math.floor(quiz.items.length/2)].id:null;
  const teaseQ=teaseId&&quiz?quiz.items.find(q=>q.id===teaseId):null;
  const url=SHARE_BASE+"?ch="+encodeURIComponent(subject)+"&sc="+pct+(teaseId?"&q="+encodeURIComponent(teaseId):"");
  const text=teaseQ?`아빠자격시험 '${subject}' ${pct}점 (${grade[1]}) — 이 문제, 너는 풀 수 있어? 함께 도전!`
    :`아빠자격시험 '${subject}' ${pct}점 (${grade[1]}) — 너도 도전해봐!`;
  const orig=btn.textContent;btn.disabled=true;btn.textContent="이미지 만드는 중…";
  let file=null;
  if(window.html2canvas){
    const teaseText=teaseQ?(teaseQ.q.length>68?teaseQ.q.slice(0,66)+"…":teaseQ.q):null;
    const node=buildResultCard({subject,pct,grade,date,tease:teaseText});document.body.appendChild(node);
    try{
      const canvas=await html2canvas(node,{scale:2,backgroundColor:null,logging:false});
      const blob=await new Promise(res=>canvas.toBlob(res,"image/png"));
      if(blob)file=new File([blob],"아빠자격시험.png",{type:"image/png"});
    }catch(e){}
    finally{ node.remove(); }
  }
  try{
    if(file&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"아빠자격시험",text,url});
    }else if(navigator.share){
      await navigator.share({title:"아빠자격시험",text,url});
    }else{
      if(file){const u=URL.createObjectURL(file);const a=document.createElement("a");a.href=u;a.download="아빠자격시험.png";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000);}
      try{await navigator.clipboard.writeText(url);alert("도전장 링크를 복사했어요.\n"+url);}catch(e){prompt("도전장 링크",url);}
    }
  }catch(e){ if(!(e&&e.name==="AbortError")){ try{await navigator.clipboard.writeText(url);}catch(_){} } }
  finally{ btn.disabled=false;btn.textContent=orig; }
}
