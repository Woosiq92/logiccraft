  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{
    background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55;
    word-break:keep-all;-webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(120% 80% at 100% 0%, color-mix(in srgb, var(--honey) 8%, transparent), transparent 55%),
      radial-gradient(90% 70% at 0% 100%, color-mix(in srgb, var(--pine) 9%, transparent), transparent 55%);
    background-attachment:fixed;
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  button{font-family:inherit;cursor:pointer}
  :focus-visible{outline:2.5px solid var(--pine);outline-offset:2px;border-radius:6px}

  /* ---- app layout: sidebar + main ---- */
  .app{display:flex;max-width:1160px;margin:0 auto;min-height:100vh;gap:0}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.3px;font-size:16px}
  .brand .mk{width:28px;height:28px;border-radius:9px;background:var(--pine);display:grid;place-items:center;color:#fff;flex:0 0 auto;
    box-shadow:0 2px 6px color-mix(in srgb,var(--pine) 40%,transparent)}
  .brand .mk svg{width:16px;height:16px}

  /* sidebar (desktop) */
  .side{display:none;width:270px;flex:0 0 auto;position:sticky;top:0;align-self:flex-start;height:100vh;
    flex-direction:column;padding:26px 22px 24px;border-right:1px solid var(--line)}
  .sidenav{display:flex;flex-direction:column;gap:4px;margin-top:34px}
  .sidenav button{display:flex;align-items:center;gap:12px;border:none;background:transparent;color:var(--muted);
    font-weight:600;font-size:14.5px;padding:12px 14px;border-radius:12px;text-align:left;width:100%;transition:background .14s,color .14s}
  .sidenav button:hover{background:var(--line-soft);color:var(--ink)}
  .sidenav button.on{background:var(--pine-soft);color:var(--pine-ink);font-weight:700}
  .sidenav button .ic{font-size:17px;width:20px;text-align:center}
  .side-foot{margin-top:auto;display:flex;flex-direction:column;gap:14px}
  .side-note{padding:14px 15px;border-radius:14px;background:var(--card);border:1px solid var(--line);
    font-size:11.5px;line-height:1.5;color:var(--muted)}
  .side-note b{color:var(--pine-ink);display:block;font-size:12.5px;margin-bottom:4px}
  .side-bottom{display:flex;align-items:center;justify-content:space-between}
  .side-bottom .lc{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.02em}
  .themebtn{border:1px solid var(--line);background:var(--card);color:var(--muted);height:36px;padding:0 12px;
    border-radius:10px;font-size:14px;display:inline-flex;align-items:center;gap:7px;flex:0 0 auto}

  /* mobile top bar */
  .mtop{display:flex;align-items:center;justify-content:space-between;padding:20px 2px 8px;position:sticky;top:0;z-index:20;
    background:linear-gradient(var(--paper) 60%,transparent);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
  .mtop .themebtn{width:38px;height:38px;padding:0;justify-content:center}

  .shell{flex:1;min-width:0;min-height:100vh;display:flex;flex-direction:column;
    padding:0 clamp(16px,4vw,40px) 120px}
  main{flex:1;display:flex;flex-direction:column;width:100%;max-width:940px;margin:0 auto}
  .result,.chal{margin-block:auto;width:100%;max-width:560px;margin-inline:auto}

  /* ---- home masthead ---- */
  .mast{padding:14px 2px 6px}
  .kicker{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--honey-ink);font-weight:600}
  .mast h1{font-size:clamp(28px,6.4vw,42px);font-weight:800;letter-spacing:-1.4px;margin:10px 0 0;text-wrap:balance;line-height:1.05}
  .mast .tag{margin-top:12px;font-size:15px;color:var(--muted);max-width:46ch}
  .disc{display:flex;gap:10px;margin-top:18px;padding:13px 15px;border-radius:14px;border:1px solid var(--line);
    background:var(--card);font-size:12.5px;line-height:1.5;color:var(--muted)}
  .disc b{color:var(--pine-ink);font-weight:700}

  /* progress strip */
  .prog{margin-top:22px;display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:var(--r);
    background:linear-gradient(135deg, var(--pine) 0%, var(--pine-deep) 100%);color:#fff;box-shadow:var(--shadow)}
  .prog .ring{position:relative;width:56px;height:56px;flex:0 0 auto}
  .prog .ring i{position:absolute;inset:7px;border-radius:50%;background:var(--pine-deep);display:grid;place-items:center;
    font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
  .prog .pt{font-size:12.5px;opacity:.8}
  .prog .pv{font-size:15.5px;font-weight:700;margin-top:2px}
  .prog .pv b{font-variant-numeric:tabular-nums}

  /* ---- stage sections ---- */
  .stage{margin-top:30px}
  .stage-hd{display:flex;align-items:center;gap:12px;padding:0 2px 2px}
  .stage-hd .no{font-family:var(--mono);font-size:12px;color:var(--honey-ink);font-weight:600;letter-spacing:.05em}
  .stage-hd .t{font-size:15px;font-weight:800;letter-spacing:-.2px}
  .stage-hd .ln{flex:1;height:1px;background:var(--line)}
  .stage-hd .c{font-size:11.5px;color:var(--faint);font-family:var(--mono)}
  .subs{display:grid;grid-template-columns:1fr;gap:11px;margin-top:14px}

  .subj{display:flex;align-items:center;gap:14px;text-align:left;padding:16px 17px;border-radius:var(--r);
    border:1px solid var(--line);background:var(--card);color:var(--ink);box-shadow:var(--shadow);
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;width:100%}
  .subj:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:color-mix(in srgb,var(--pine) 40%,var(--line))}
  .subj .ico{width:42px;height:42px;border-radius:12px;background:var(--pine-soft);color:var(--pine-ink);
    display:grid;place-items:center;font-size:19px;flex:0 0 auto}
  .subj .nm{font-size:15.5px;font-weight:700;letter-spacing:-.2px}
  .subj .mt{margin-top:3px;font-size:12px;color:var(--muted);font-family:var(--mono)}
  .badge{flex:0 0 auto;white-space:nowrap;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
  .badge.none{background:transparent;border:1px solid var(--line);color:var(--faint);font-weight:600}
  .badge.have{background:var(--pine-soft);color:var(--pine-ink)}
  .badge.top{background:var(--honey-soft);color:var(--honey-ink)}
  .chev{color:var(--faint);font-size:19px;flex:0 0 auto}

  /* ---- quiz workspace ---- */
  .quiz{padding:6px 2px}
  .q-main{min-width:0}
  .q-top{display:flex;align-items:center;gap:14px;padding:6px 0 0}
  .icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font-size:19px;line-height:1;flex:0 0 auto}
  .q-meta{flex:1;min-width:0}
  .q-meta .s{font-size:14px;font-weight:700;letter-spacing:-.2px}
  .q-meta .p{font-size:11.5px;color:var(--muted);font-family:var(--mono);margin-top:1px}
  .q-count{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums}
  .q-bar{height:5px;border-radius:99px;background:var(--line-soft);overflow:hidden}
  .q-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pine),var(--pine-deep));transition:width .3s ease}
  .q-progm{margin-top:16px}
  .q-rail{display:none;flex-direction:column;gap:12px;position:sticky;top:18px}
  .rail-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;box-shadow:var(--shadow)}
  .rail-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .rail-count{margin-top:6px;font-size:15px;color:var(--muted);font-variant-numeric:tabular-nums}
  .rail-count b{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-1px}
  .rail-card .q-bar{margin-top:11px}
  .rail-dots{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
  .dot{width:16px;height:16px;border-radius:50%;background:var(--line);border:1.5px solid var(--line);display:grid;place-items:center;font-size:9px;font-weight:900;color:#fff;line-height:1}
  .dot.cur{background:var(--card);border-color:var(--pine);box-shadow:0 0 0 3px var(--pine-soft)}
  .dot.ok{background:var(--correct);border-color:var(--correct)}
  .dot.no{background:var(--wrong);border-color:var(--wrong)}
  .rail-score{margin-top:7px;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
  .rail-score .ok{color:var(--correct)} .rail-score .no{color:var(--wrong)} .rail-score .sep{color:var(--faint);font-weight:400;margin:0 6px}
  .rail-subname{margin-top:6px;font-size:14.5px;font-weight:700;letter-spacing:-.2px;line-height:1.35}
  .rail-subnote{margin-top:4px;font-size:12px;color:var(--muted);font-family:var(--mono)}
  .q-card{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:26px 22px;box-shadow:var(--shadow)}
  .q-text{font-size:21px;font-weight:800;line-height:1.4;letter-spacing:-.5px;text-wrap:balance}
  .opts{display:flex;flex-direction:column;gap:11px;margin-top:22px}
  .opt{display:flex;align-items:center;gap:14px;text-align:left;padding:15px 16px;border-radius:15px;
    border:1.5px solid var(--line);background:var(--paper);color:var(--ink);font-size:15.5px;line-height:1.4;
    min-height:56px;transition:border-color .14s, background .14s;width:100%}
  .opt:hover{border-color:color-mix(in srgb,var(--pine) 50%,var(--line))}
  .opt .ob{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;font-size:13px;font-weight:800;
    border:1.5px solid var(--line);color:var(--muted);background:var(--card);flex:0 0 auto;font-variant-numeric:tabular-nums}
  .opt.correct{border-color:var(--correct);background:var(--correct-soft)}
  .opt.correct .ob{border:none;color:#fff;background:var(--correct)}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-soft)}
  .opt.wrong .ob{border:none;color:#fff;background:var(--wrong)}
  .opt.dim{opacity:.5}
  .opt:disabled{cursor:default}

  .fb{margin-top:16px;border-radius:var(--r);border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow);animation:rise .22s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fb .hd{display:flex;align-items:center;gap:9px;padding:15px 18px;font-weight:800;font-size:15.5px}
  .fb.ok .hd{background:var(--correct-soft);color:var(--correct)}
  .fb.no .hd{background:var(--wrong-soft);color:var(--wrong)}
  .fb .bd{padding:16px 18px;background:var(--card)}
  .fb .exp{font-size:14px;line-height:1.65;color:var(--ink);opacity:.9}
  .fb .src{margin-top:12px;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);
    font-family:var(--mono);padding:5px 10px;border-radius:8px;background:var(--paper);border:1px solid var(--line)}
  .cta{display:block;width:100%;padding:16px;border:none;border-radius:15px;background:var(--pine);color:#fff;
    font-size:16px;font-weight:800;letter-spacing:-.2px;box-shadow:0 8px 18px -8px color-mix(in srgb,var(--pine) 60%,transparent);
    transition:transform .14s, box-shadow .14s}
  .cta:hover{transform:translateY(-2px)}
  .cta.ghost{background:transparent;border:1.5px solid var(--line);color:var(--pine-ink);box-shadow:none}
  .cta.honey{background:var(--honey);box-shadow:0 8px 18px -8px color-mix(in srgb,var(--honey) 60%,transparent)}
  .cta:disabled{opacity:.6}
  .stack{display:flex;flex-direction:column;gap:10px;margin-top:18px}

  /* ---- result ---- */
  .result{padding:8px 2px 6px;text-align:center;animation:rise .3s ease}
  .r-kick{font-family:var(--mono);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .r-sub{margin-top:4px;font-size:15px;font-weight:700}
  .gauge{position:relative;width:210px;height:210px;margin:24px auto 0}
  .gauge svg{transform:rotate(-90deg);display:block}
  .gauge .in{position:absolute;inset:0;display:grid;place-items:center;flex-direction:column}
  .gauge .sc{font-size:58px;font-weight:800;line-height:1;letter-spacing:-2px;font-variant-numeric:tabular-nums}
  .gauge .of{font-size:13px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
  .seal{display:inline-flex;align-items:center;gap:9px;margin-top:22px;padding:11px 22px;border-radius:99px;font-weight:800;font-size:17px}
  .seal .st{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:12px;color:#fff}
  .seal.gold{background:var(--honey-soft);color:var(--honey-ink)} .seal.gold .st{background:var(--honey)}
  .seal.pine{background:var(--pine-soft);color:var(--pine-ink)} .seal.pine .st{background:var(--pine)}
  .seal.muted{background:var(--line-soft);color:var(--muted)} .seal.muted .st{background:var(--faint)}
  .r-note{margin:14px auto 0;max-width:34ch;font-size:12px;line-height:1.55;color:var(--muted)}

  /* ---- pages (wrong / report) ---- */
  .page{padding:6px 2px}
  .page-h{font-size:26px;font-weight:800;letter-spacing:-.8px}
  .page-s{margin-top:5px;font-size:13.5px;color:var(--muted)}
  .empty{text-align:center;padding:64px 20px;color:var(--muted)}
  .empty .e-ic{width:74px;height:74px;border-radius:22px;background:var(--pine-soft);color:var(--pine-ink);
    display:grid;place-items:center;font-size:30px;margin:0 auto}
  .empty .e-t{margin-top:18px;font-size:17px;font-weight:800;color:var(--ink)}
  .empty .e-d{margin-top:7px;font-size:13.5px;line-height:1.6}
  .w-item{position:relative;padding:15px 44px 15px 16px;border-radius:15px;border:1px solid var(--line);background:var(--card);box-shadow:var(--shadow)}
  .w-tag{display:inline-block;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;background:var(--honey-soft);color:var(--honey-ink)}
  .w-q{margin-top:9px;font-size:14.5px;line-height:1.45;font-weight:600}
  .w-x{position:absolute;top:11px;right:11px;width:26px;height:26px;border:none;background:transparent;color:var(--faint);font-size:13px}

  .avg{margin-top:16px;display:flex;align-items:center;gap:18px;padding:20px 22px;border-radius:var(--r-lg);
    background:linear-gradient(135deg,var(--pine),var(--pine-deep));color:#fff;box-shadow:var(--shadow)}
  .avg .lb{font-size:12px;opacity:.82}
  .avg .bignum{display:flex;align-items:baseline;gap:3px;margin-top:3px}
  .avg .bignum b{font-size:42px;font-weight:800;line-height:1;letter-spacing:-1.5px;font-variant-numeric:tabular-nums}
  .avg .bignum span{font-size:16px;font-weight:700}
  .rp{display:flex;flex-direction:column;gap:15px;margin-top:22px}
  .rp-row .hd{display:flex;justify-content:space-between;align-items:baseline}
  .rp-row .n{font-size:14px;font-weight:600}
  .rp-row .s{font-size:13px;font-weight:800;color:var(--pine-ink);font-variant-numeric:tabular-nums}
  .rp-bar{margin-top:7px;height:9px;border-radius:99px;background:var(--line-soft);overflow:hidden}
  .rp-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pine),var(--pine-deep))}

  /* share card (screen preview) */
  .sharewrap{margin-top:28px}
  .share-lb{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .share{margin-top:10px;aspect-ratio:1.6/1;border-radius:var(--r-lg);padding:28px;color:#fff;position:relative;overflow:hidden;
    background:linear-gradient(150deg,var(--pine-deep),var(--pine));box-shadow:var(--shadow-lg);display:flex;flex-direction:column;justify-content:space-between}
  .share::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;
    background:radial-gradient(circle,color-mix(in srgb,var(--honey) 55%,transparent),transparent 70%)}
  .share .sb{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;position:relative}
  .share .sm b{font-size:30px;font-weight:800;letter-spacing:-.8px;line-height:1.2;display:block}
  .share .smeta{margin-top:8px;font-size:13px;opacity:.85;font-variant-numeric:tabular-nums}
  .share .sfoot{font-size:10.5px;opacity:.72;line-height:1.5;position:relative}

  /* ---- challenge ---- */
  .chal{padding:12px 2px;text-align:center;animation:rise .3s ease}
  .chal .env{font-family:var(--mono);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--honey-ink)}
  .chal .who{margin-top:20px;font-size:16px;color:var(--muted)}
  .chal .who b{color:var(--ink)}

  /* ---- bottom tabbar (mobile) ---- */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:center;
    padding:8px 12px calc(8px + env(safe-area-inset-bottom))}
  .tabbar .inner{display:flex;gap:4px;background:color-mix(in srgb,var(--card) 88%,transparent);
    -webkit-backdrop-filter:blur(14px) saturate(1.4);backdrop-filter:blur(14px) saturate(1.4);border:1px solid var(--line);border-radius:99px;padding:6px;box-shadow:var(--shadow-lg)}
  .tabbar button{border:none;background:transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:8px 22px;border-radius:99px;font-size:11px;font-weight:700}
  .tabbar button .ic{font-size:17px}
  .tabbar button.on{background:var(--pine-soft);color:var(--pine-ink)}

  @media (min-width:880px){
    .side{display:flex}
    .mtop{display:none}
    .tabbar{display:none}
    .shell{padding:34px clamp(24px,3vw,44px) 48px}
    .subs{grid-template-columns:repeat(auto-fill,minmax(252px,1fr))}
    .mast{padding-top:6px}
    .mast .disc{display:none}
    .quiz{display:grid;grid-template-columns:minmax(0,1fr) 292px;gap:32px;align-items:start;margin-block:auto;padding-block:16px}
    .q-rail{display:flex}
    .q-progm{display:none}
    .q-top .q-count{display:none}
  }
  @media (min-width:1200px){ .subs{grid-template-columns:repeat(auto-fill,minmax(258px,1fr))} }
  @media (max-width:879px){ .side{display:none} .app{display:block} }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="mk"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>아빠자격시험</div>
    <nav class="sidenav">
      <button data-tab="home" class="on"><span class="ic">📝</span>시험</button>
      <button data-tab="wrong"><span class="ic">📕</span>오답노트</button>
      <button data-tab="report"><span class="ic">📊</span>성적표</button>
    </nav>
    <div class="side-foot">
      <div class="side-note"><b>🌱 재미로 보는 자가점검</b>국가공인 자격이 아니고, 의료 조언을 대신하지 않아요.</div>
      <div class="side-bottom"><span class="lc">logiccraft.co.kr</span><button class="themebtn" aria-label="테마 전환">◐ 테마</button></div>
    </div>
  </aside>
  <div class="shell">
    <header class="mtop">
      <div class="brand"><span class="mk"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>아빠자격시험</div>
      <button class="themebtn" aria-label="테마 전환">◐</button>
    </header>
    <main id="view"></main>
  </div>
</div>

<nav class="tabbar"><div class="inner">
  <button data-tab="home" class="on"><span class="ic">📝</span>시험</button>
  <button data-tab="wrong"><span class="ic">📕</span>오답노트</button>
  <button data-tab="report"><span class="ic">📊</span>성적표</button>
</div></nav>

<script>
const STAGES=[{key:"prep",name:"예비 아빠",ico:"🤰"},{key:"newborn",name:"신생아 · 0~100일",ico:"👶"},{key:"common",name:"공통 · 육아 용어",ico:"📖"}];
const GRADES=[[90,"마스터 아빠","gold"],[75,"베테랑 아빠","pine"],[60,"주니어 아빠","pine"],[40,"수습 아빠","muted"],[0,"인턴 아빠","muted"]];
const LS_BEST="dadexam.best", LS_WRONG="dadexam.wrong", LS_THEME="dadexam.theme";
const SHARE_BASE="https://logiccraft.co.kr/dadexam/";
const QUIZ_N=10;
const view=document.getElementById("view");
let QS=[], subjects=[], mem={best:{},wrong:[]};
try{ mem.best=JSON.parse(localStorage.getItem(LS_BEST))||{}; mem.wrong=JSON.parse(localStorage.getItem(LS_WRONG))||[]; }catch(e){}
const saveBest=()=>{try{localStorage.setItem(LS_BEST,JSON.stringify(mem.best))}catch(e){}};
const saveWrong=()=>{try{localStorage.setItem(LS_WRONG,JSON.stringify(mem.wrong))}catch(e){}};
const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const gradeOf=p=>GRADES.find(g=>p>=g[0]);
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};

/* theme toggle (persisted) */
document.querySelectorAll(".themebtn").forEach(btn=>btn.onclick=()=>{
  const cur=document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  const next=cur==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  try{localStorage.setItem(LS_THEME,next);}catch(e){}
});

/* nav — 사이드바(데스크톱)는 상시 노출, 하단 탭바(모바일)만 집중화면에서 숨김 */
function setTab(t){document.querySelectorAll("[data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===t));
  document.querySelector(".tabbar").style.visibility=t?"":"hidden";}
function go(t){setTab(t);({home:renderHome,wrong:renderWrong,report:renderReport}[t])();window.scrollTo(0,0);}

async function init(){
  try{ QS=await (await fetch("./data/questions.json")).json(); }
  catch(e){ view.innerHTML='<div class="empty" style="padding-top:100px">문항을 불러오지 못했어요.</div>'; return; }
  const seen={};
  QS.forEach(q=>{const k=q.stage+"|"+q.subject; if(!seen[k])seen[k]={stage:q.stage,subject:q.subject,items:[]}; seen[k].items.push(q);});
  subjects=Object.values(seen);
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>go(b.dataset.tab));
  const p=new URLSearchParams(location.search), ch=p.get("ch"), sc=parseInt(p.get("sc"),10);
  if(ch && subjects.some(s=>s.subject===ch)) renderChallenge(ch, isFinite(sc)?sc:null);
  else go("home");
}

/* ---------- HOME ---------- */
function renderHome(){
  const best=mem.best, done=subjects.filter(s=>best[s.subject]!=null);
  const avg=done.length?Math.round(done.reduce((a,s)=>a+best[s.subject],0)/done.length):null;
  let h=`<section class="mast">
    <div class="kicker">예비·초보 아빠 · 육아 상식 자가점검</div>
    <h1>나는 몇 점짜리 아빠일까?</h1>
    <p class="tag">예비·초보 아빠 육아 상식을 시험으로 점검하고 등급을 받아요. 임신·출산·신생아 15과목, 틀린 문제는 근거와 함께.</p>
    <div class="disc"><span>🌱</span><span><b>재미로 보는 자가점검이에요.</b> 국가공인 자격이 아니고, 의료 조언을 대신하지 않아요.</span></div>`;
  if(avg!=null){const g=gradeOf(avg);
    h+=`<div class="prog"><div class="ring"><svg width="56" height="56"><circle cx="28" cy="28" r="24" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="5"/><circle cx="28" cy="28" r="24" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-dasharray="${(2*Math.PI*24).toFixed(1)}" stroke-dashoffset="${(2*Math.PI*24*(1-avg/100)).toFixed(1)}" transform="rotate(-90 28 28)"/></svg><i>${avg}</i></div>
      <div><div class="pt">지금까지 평균</div><div class="pv"><b>${done.length}</b>과목 점검 · <b>${g[1]}</b></div></div></div>`;
  }
  h+=`</section>`;
  STAGES.forEach((st,i)=>{
    const subs=subjects.filter(s=>s.stage===st.key); if(!subs.length)return;
    h+=`<section class="stage"><div class="stage-hd"><span class="no">${String(i+1).padStart(2,"0")}</span><span class="t">${esc(st.name)}</span><span class="ln"></span><span class="c">${subs.length}과목</span></div><div class="subs">`;
    subs.forEach(s=>{const b=best[s.subject];
      const badge=b==null?`<span class="badge none">미응시</span>`:`<span class="badge ${b>=90?"top":"have"}">최고 ${b}</span>`;
      h+=`<button class="subj" data-subj="${esc(s.subject)}">
        <span class="ico">${st.ico}</span>
        <span style="flex:1;min-width:0"><span class="nm" style="display:block">${esc(s.subject)}</span><span class="mt">${s.items.length>QUIZ_N?`${s.items.length}문항 중 ${QUIZ_N}개 출제`:`${s.items.length}문항`}</span></span>
        ${badge}<span class="chev">›</span></button>`;
    });
    h+=`</div></section>`;
  });
  view.innerHTML=h;
  view.querySelectorAll("[data-subj]").forEach(el=>el.onclick=()=>{
    const s=subjects.find(x=>x.subject===el.dataset.subj); startQuiz(s.items,s.subject);
  });
}

/* ---------- QUIZ ---------- */
let quiz=null;
function startQuiz(pool,label,sample=true){
  let play=shuffle(pool.slice());
  if(sample&&play.length>QUIZ_N)play=play.slice(0,QUIZ_N);
  quiz={source:pool,items:play,label,i:0,correct:0,wrong:[],results:[],answered:false};
  setTab(null);renderQuiz();window.scrollTo(0,0);
}
function railDots(){
  return quiz.items.map((_,idx)=>{
    let cls="dot", gl="";
    if(idx<quiz.results.length){const r=quiz.results[idx];cls+=" "+r;gl=r==="ok"?"✓":"✕";}
    else if(idx===quiz.i) cls+=" cur";
    return `<span class="${cls}">${gl}</span>`;
  }).join("");
}
function railScore(){
  const ans=quiz.results.length, ok=quiz.results.filter(r=>r==="ok").length;
  if(!ans) return `<span style="color:var(--muted);font-weight:400">아직 없음</span>`;
  return `<span class="ok">정답 ${ok}</span><span class="sep">·</span><span class="no">오답 ${ans-ok}</span>`;
}
function renderQuiz(){
  const q=quiz.items[quiz.i], n=quiz.items.length, pct=Math.round((quiz.i+1)/n*100);
  const stageName=(STAGES.find(s=>s.key===q.stage)||{}).name||"";
  view.innerHTML=`<section class="quiz">
    <div class="q-main">
      <div class="q-top"><button class="icon-btn" id="qback" aria-label="뒤로">‹</button>
        <div class="q-meta"><div class="s">${esc(quiz.label)}</div><div class="p">즉시 채점 · 근거 해설</div></div>
        <div class="q-count">${quiz.i+1} / ${n}</div></div>
      <div class="q-bar q-progm"><i style="width:${pct}%"></i></div>
      <div class="q-card"><div class="q-text">${esc(q.q)}</div>
        <div class="opts" id="opts">${q.choices.map((c,idx)=>`<button class="opt" data-i="${idx}"><span class="ob">${idx+1}</span><span style="flex:1">${esc(c)}</span></button>`).join("")}</div>
      </div><div id="fb"></div>
    </div>
    <aside class="q-rail">
      <div class="rail-card"><div class="rail-label">진행</div>
        <div class="rail-count"><b>${quiz.i+1}</b> / ${n}</div>
        <div class="q-bar"><i style="width:${pct}%"></i></div>
        <div class="rail-dots" id="railDots">${railDots()}</div></div>
      <div class="rail-card"><div class="rail-label">지금까지</div>
        <div class="rail-score" id="railScore">${railScore()}</div></div>
      <div class="rail-card"><div class="rail-label">과목</div>
        <div class="rail-subname">${esc(quiz.label)}</div>
        <div class="rail-subnote">${esc(stageName)}${stageName?" · ":""}${quiz.source.length}문항</div></div>
    </aside></section>`;
  document.getElementById("qback").onclick=()=>go("home");
  document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>pick(+b.dataset.i));
}
function pick(idx){
  if(quiz.answered)return;quiz.answered=true;
  const q=quiz.items[quiz.i], right=q.answer, ok=idx===right;
  document.querySelectorAll(".opt").forEach((b,i)=>{b.disabled=true;
    if(i===right){b.classList.add("correct");b.querySelector(".ob").textContent="✓";}
    else if(i===idx){b.classList.add("wrong");b.querySelector(".ob").textContent="✕";}
    else b.classList.add("dim");});
  if(ok)quiz.correct++;else quiz.wrong.push(q.id);
  quiz.results[quiz.i]=ok?"ok":"no";
  const rd=document.getElementById("railDots");if(rd)rd.innerHTML=railDots();
  const rs=document.getElementById("railScore");if(rs)rs.innerHTML=railScore();
  const last=quiz.i+1>=quiz.items.length;
  document.getElementById("fb").innerHTML=`<div class="fb ${ok?"ok":"no"}">
    <div class="hd">${ok?"✓ 정답이에요":"✕ 다시 기억해요"}</div>
    <div class="bd"><div class="exp">${esc(q.explain)}</div><div class="src">📎 ${esc(q.source)}</div>
      <div class="stack"><button class="cta" id="next">${last?"채점 결과 보기":"다음 문제"}</button></div></div></div>`;
  document.getElementById("next").onclick=()=>{if(!last){quiz.i++;quiz.answered=false;renderQuiz();window.scrollTo(0,0);}else finishQuiz();};
  document.getElementById("fb").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function finishQuiz(){
  const pct=Math.round(quiz.correct/quiz.items.length*100), g=gradeOf(pct), nWrong=quiz.wrong.length;
  if(mem.best[quiz.label]==null||pct>mem.best[quiz.label]){mem.best[quiz.label]=pct;saveBest();}
  const w=new Set(mem.wrong);quiz.items.forEach(q=>{if(quiz.wrong.includes(q.id))w.add(q.id);else w.delete(q.id);});mem.wrong=[...w];saveWrong();
  const R=94, C=2*Math.PI*R;
  view.innerHTML=`<section class="result">
    <div class="r-kick">채점 완료</div><div class="r-sub">${esc(quiz.label)}</div>
    <div class="gauge"><svg width="210" height="210" viewBox="0 0 210 210">
      <circle cx="105" cy="105" r="${R}" fill="none" stroke="var(--line-soft)" stroke-width="14"/>
      <circle cx="105" cy="105" r="${R}" fill="none" stroke="var(--pine)" stroke-width="14" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${(C*(1-pct/100)).toFixed(1)}"/>
    </svg><div class="in"><div class="sc">${pct}</div><div class="of">/ 100점</div></div></div>
    <div class="seal ${g[2]}"><span class="st">${g[2]==="gold"?"★":"●"}</span>${g[1]}</div>
    <div class="r-note">아빠 등급은 재미로 보는 자가점검 결과예요. 공인 자격이 아니에요.</div>
    <div class="stack">
      <button class="cta" id="retry">${nWrong?`틀린 ${nWrong}문제 다시 풀기`:"한 번 더 풀기"}</button>
      <button class="cta honey" id="share">결과 공유하고 도전장 보내기</button>
      <button class="cta ghost" id="other">다른 과목 풀기</button></div></section>`;
  document.getElementById("retry").onclick=()=>{
    if(nWrong)startQuiz(quiz.items.filter(q=>quiz.wrong.includes(q.id)),quiz.label,false);
    else startQuiz(quiz.source,quiz.label,true);
  };
  document.getElementById("share").onclick=e=>shareResult(e.currentTarget,quiz.label,pct,g);
  document.getElementById("other").onclick=()=>go("home");
}

/* ---------- WRONG ---------- */
function renderWrong(){
  const w=new Set(mem.wrong), items=QS.filter(q=>w.has(q.id));
  if(!items.length){view.innerHTML=`<section class="page"><div class="page-h">오답노트</div>
    <div class="empty"><div class="e-ic">✓</div><div class="e-t">오답노트가 비어 있어요</div><div class="e-d">틀린 문제가 여기에 모여요.<br>지금은 깨끗한 상태예요.</div></div></section>`;return;}
  let h=`<section class="page"><div class="page-h">오답노트</div><div class="page-s">틀린 문제를 모아 다시 풀어요.</div>
    <div class="stack" style="margin-top:16px"><button class="cta" id="all">오답 전체 다시 풀기 · ${items.length}문제</button></div>
    <div class="rp" id="list" style="margin-top:18px;gap:11px"></div></section>`;
  view.innerHTML=h;
  document.getElementById("all").onclick=()=>startQuiz(items,"오답 다시 풀기",false);
  const list=document.getElementById("list");
  items.forEach(q=>{const d=document.createElement("div");d.className="w-item";
    d.innerHTML=`<span class="w-tag">${esc(q.subject)}</span><div class="w-q">${esc(q.q)}</div><button class="w-x" aria-label="삭제">✕</button>`;
    d.querySelector(".w-x").onclick=()=>{const s=new Set(mem.wrong);s.delete(q.id);mem.wrong=[...s];saveWrong();renderWrong();};
    list.appendChild(d);});
}

/* ---------- REPORT ---------- */
function renderReport(){
  const best=mem.best, done=subjects.filter(s=>best[s.subject]!=null);
  if(!done.length){view.innerHTML=`<section class="page"><div class="page-h">성적표</div>
    <div class="empty"><div class="e-ic">📊</div><div class="e-t">아직 응시한 과목이 없어요</div><div class="e-d">시험을 풀면 성적표가 채워져요.</div></div></section>`;return;}
  const avg=Math.round(done.reduce((a,s)=>a+best[s.subject],0)/done.length), g=gradeOf(avg);
  const now=new Date(), ds=`${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}`;
  let h=`<section class="page"><div class="page-h">성적표</div><div class="page-s">과목별 최고점과 평균이에요.</div>
    <div class="avg"><div style="flex:1"><div class="lb">평균 점수</div><div class="bignum"><b>${avg}</b><span>점</span></div></div>
      <div class="seal ${g[2]}" style="margin:0"><span class="st">${g[2]==="gold"?"★":"●"}</span>${g[1]}</div></div>
    <div class="rp">`;
  done.forEach(s=>{const b=best[s.subject];h+=`<div class="rp-row"><div class="hd"><span class="n">${esc(s.subject)}</span><span class="s">${b}점</span></div><div class="rp-bar"><i style="width:${b}%"></i></div></div>`;});
  h+=`</div><div class="sharewrap"><div class="share-lb">공유용 점검 카드</div>
    <div class="share"><div class="sb">🌱 아빠자격시험</div>
      <div class="sm"><b>육아 상식 점검 완료</b><div class="smeta">${done.length}과목 점검 · 평균 ${avg}점 · ${g[1]}</div></div>
      <div class="sfoot">재미로 보는 자가점검이에요. 국가공인 자격이 아니에요.</div></div>
    <div class="stack" style="margin-top:14px"><button class="cta honey" id="shareBtn">이미지로 저장 · 공유</button></div>
  </div></section>`;
  view.innerHTML=h;
  const sb=document.getElementById("shareBtn");
  sb.onclick=()=>shareCard(sb,{count:done.length,avg,grade:g,date:ds});
}

/* ---------- CHALLENGE (받은 도전장) ---------- */
function renderChallenge(subject,pct){
  history.replaceState(null,"",location.pathname);
  const s=subjects.find(x=>x.subject===subject);
  const g=(pct!=null)?gradeOf(pct):null;
  const R=90, C=2*Math.PI*R, deg=pct!=null?pct:100;
  setTab(null);
  view.innerHTML=`<section class="chal">
    <div class="env">🌱 받은 도전장</div>
    <div class="gauge" style="margin-top:18px"><svg width="210" height="210" viewBox="0 0 210 210">
      <circle cx="105" cy="105" r="${R}" fill="none" stroke="var(--line-soft)" stroke-width="13"/>
      <circle cx="105" cy="105" r="${R}" fill="none" stroke="var(--honey)" stroke-width="13" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${(C*(1-deg/100)).toFixed(1)}"/>
    </svg><div class="in">${pct!=null?`<div class="sc">${pct}</div><div class="of">/ 100점</div>`:`<div class="of" style="font-size:17px;font-weight:800;color:var(--honey-ink)">도전!</div>`}</div></div>
    ${g?`<div class="seal ${g[2]}"><span class="st">${g[2]==="gold"?"★":"●"}</span>친구는 ${g[1]}</div>`:""}
    <div class="who">친구가 <b>‘${esc(subject)}’</b> 시험에서${pct!=null?` ${pct}점을 받았어요.`:" 도전했어요."}<br>나도 같은 시험을 풀어볼까요?</div>
    <div class="stack" style="margin-top:24px">
      <button class="cta honey" id="cgo">나도 이 과목 도전하기</button>
      <button class="cta ghost" id="chome">처음부터 둘러보기</button></div></section>`;
  document.getElementById("cgo").onclick=()=>startQuiz(s.items,s.subject);
  document.getElementById("chome").onclick=()=>go("home");
}

/* ---------- 공유 카드 이미지화 (html2canvas) ---------- */
function toneColors(t){return t==="gold"?["#F4E6CB","#8A5E1E"]:t==="pine"?["#E2EDE7","#234F42"]:["#EAE0CF","#8A8073"];}
function buildCaptureCard(d){
  const [gbg,gcol]=toneColors(d.grade[2]);
  const w=document.createElement("div");
  w.style.cssText="position:fixed;left:-9999px;top:0;width:720px;height:720px;box-sizing:border-box;padding:60px;"
    +"background:#FFFDF9;border-radius:44px;display:flex;flex-direction:column;"
    +"font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;";
  w.innerHTML=`<div style="display:flex;align-items:center;gap:12px">
      <div style="width:26px;height:26px;border-radius:9px;background:#2F6E5B"></div>
      <div style="font-size:24px;font-weight:800;color:#2F6E5B;letter-spacing:-.3px">아빠자격시험</div></div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
      <div style="font-size:60px;font-weight:800;letter-spacing:-1.5px;line-height:1.25;color:#26231E">육아 상식<br>점검 완료</div>
      <div style="margin-top:30px;font-size:27px;color:#8A8073">${d.count}과목 점검 · 평균 ${d.avg}점</div>
      <div style="align-self:flex-start;margin-top:24px;padding:13px 32px;border-radius:99px;font-size:29px;font-weight:800;background:${gbg};color:${gcol}">${d.grade[1]}</div></div>
    <div style="font-size:19px;line-height:1.5;color:#8A8073">재미로 보는 자가점검이에요. 국가공인 자격이 아니에요. · ${d.date}</div>`;
  return w;
}
function buildResultCard(d){
  const [gbg,gcol]=toneColors(d.grade[2]);
  const w=document.createElement("div");
  w.style.cssText="position:fixed;left:-9999px;top:0;width:720px;height:720px;box-sizing:border-box;padding:60px;"
    +"background:#FFFDF9;border-radius:44px;display:flex;flex-direction:column;"
    +"font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;";
  w.innerHTML=`<div style="display:flex;align-items:center;gap:12px">
      <div style="width:26px;height:26px;border-radius:9px;background:#2F6E5B"></div>
      <div style="font-size:24px;font-weight:800;color:#2F6E5B;letter-spacing:-.3px">아빠자격시험</div></div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
      <div style="font-size:28px;color:#8A8073">${esc(d.subject)}</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-top:10px">
        <div style="font-size:96px;font-weight:800;letter-spacing:-3px;line-height:1;color:#26231E">${d.pct}</div>
        <div style="font-size:30px;font-weight:700;color:#8A8073">점</div></div>
      <div style="align-self:flex-start;margin-top:22px;padding:13px 32px;border-radius:99px;font-size:29px;font-weight:800;background:${gbg};color:${gcol}">${d.grade[1]}</div>
      <div style="margin-top:30px;font-size:26px;font-weight:700;color:#C0842F">너도 도전해봐 →</div></div>
    <div style="font-size:19px;line-height:1.5;color:#8A8073">재미로 보는 자가점검이에요. 국가공인 자격이 아니에요. · ${d.date}</div>`;
  return w;
}
async function shareBlob(blob){
  const file=new File([blob],"아빠자격시험.png",{type:"image/png"});
  try{
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"아빠자격시험",text:"육아 상식 점검 완료"});return;
    }
  }catch(e){ if(e&&e.name==="AbortError")return; }
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="아빠자격시험.png";
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function shareCard(btn,d){
  if(!window.html2canvas){alert("이미지 생성 모듈을 불러오지 못했어요.");return;}
  const orig=btn.textContent;btn.disabled=true;btn.textContent="이미지 만드는 중…";
  const node=buildCaptureCard(d);document.body.appendChild(node);
  try{
    const canvas=await html2canvas(node,{scale:2,backgroundColor:null,logging:false});
    await new Promise(res=>canvas.toBlob(async b=>{await shareBlob(b);res();},"image/png"));
  }catch(e){ alert("이미지를 만들지 못했어요."); }
  finally{ node.remove();btn.disabled=false;btn.textContent=orig; }
}
async function shareResult(btn,subject,pct,grade){
  const now=new Date(), date=`${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}`;
  const url=SHARE_BASE+"?ch="+encodeURIComponent(subject)+"&sc="+pct;
  const text=`아빠자격시험 '${subject}' ${pct}점 (${grade[1]}) — 너도 도전해봐!`;
  const orig=btn.textContent;btn.disabled=true;btn.textContent="이미지 만드는 중…";
  let file=null;
  if(window.html2canvas){
    const node=buildResultCard({subject,pct,grade,date});document.body.appendChild(node);
    try{
      const canvas=await html2canvas(node,{scale:2,backgroundColor:null,logging:false});
      const blob=await new Promise(res=>canvas.toBlob(res,"image/png"));
      if(blob)file=new File([blob],"아빠자격시험.png",{type:"image/png"});
    }catch(e){}
    finally{ node.remove(); }
  }
  try{
    if(file&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"아빠자격시험",text,url});
    }else if(navigator.share){
      await navigator.share({title:"아빠자격시험",text,url});
    }else{
      if(file){const u=URL.createObjectURL(file);const a=document.createElement("a");a.href=u;a.download="아빠자격시험.png";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000);}
      try{await navigator.clipboard.writeText(url);alert("도전장 링크를 복사했어요.\n"+url);}catch(e){prompt("도전장 링크",url);}
    }
  }catch(e){ if(!(e&&e.name==="AbortError")){ try{await navigator.clipboard.writeText(url);}catch(_){} } }
  finally{ btn.disabled=false;btn.textContent=orig; }
}

init();
</script>
