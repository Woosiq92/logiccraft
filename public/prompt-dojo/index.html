<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#13110d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="icon" href="data:," sizes="any">
<title>프롬프트 도장</title>
<style>
  :root{
    --bg:#13110d; --surface:#1c1813; --surface2:#221f1a; --mono-bg:#100e0a;
    --line:#3a342a; --line2:#45403a;
    --ink:#e7e1d7; --ink2:#cfc9bf; --dim:#9b948a; --faint:#6c665c;
    --gold:#d8a44a; --gold-soft:#e9c479; --gold-dim:#2e2719;
    --ok:#7fd3a4; --ok-bg:#172420; --bad:#e88a84; --bad-bg:#261917;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.6 'Pretendard','Pretendard Variable',-apple-system,'Apple SD Gothic Neo',BlinkMacSystemFont,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}
  .wrap{max-width:680px;margin:0 auto;padding:max(20px,env(safe-area-inset-top)) 16px 80px}
  /* 헤더 */
  .brand{display:flex;align-items:center;gap:13px;margin-bottom:14px}
  .logo{width:50px;height:50px;border-radius:14px;flex:none;display:flex;align-items:center;justify-content:center;
    font-size:26px;font-weight:800;color:var(--gold-soft);background:var(--surface2);
    border:1.5px solid var(--gold);box-shadow:inset 0 1px 0 #ffffff0d}
  .overline{font-size:10px;letter-spacing:3px;color:var(--gold);font-weight:800;text-transform:uppercase;margin-bottom:1px}
  h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.3px}
  .tagline{font-size:16px;font-weight:700;color:var(--ink);margin:2px 0 4px}
  .sub{color:var(--dim);font-size:13px;margin-bottom:16px}
  /* 탭 */
  .tabs{display:flex;gap:8px;margin-bottom:12px}
  .tab{flex:1;padding:11px;border:1px solid var(--line);border-radius:11px;background:transparent;color:var(--dim);
    text-align:center;cursor:pointer;font-weight:700;font-size:14px;transition:.15s}
  .tab.on{background:var(--surface2);border-color:var(--gold);color:var(--ink)}
  .tab .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);display:inline-block;margin-right:7px;vertical-align:middle}
  .tab.on .dot{background:var(--gold);box-shadow:0 0 6px var(--gold)}
  .status{font-size:12px;color:var(--dim);margin:0 2px 8px}
  .status::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ok);margin-right:7px;vertical-align:middle}
  .section-label{font-size:11px;letter-spacing:4px;color:var(--faint);text-transform:uppercase;font-weight:700;margin:16px 2px 9px}
  /* 레벨 카드 */
  .lvl{border:1px solid var(--line);border-radius:14px;background:var(--surface);margin-bottom:10px;overflow:hidden}
  .lvl.locked{opacity:.5}
  .lvl-head{display:flex;align-items:center;gap:11px;padding:14px 15px;cursor:pointer}
  .lv-badge{width:30px;height:30px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .lv-badge.num{background:var(--gold-dim);color:var(--gold-soft);border:1px solid var(--gold)}
  .lv-badge.done{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok);border-radius:50%}
  .lv-badge.lock{background:transparent;color:var(--faint);border:1px solid var(--line)}
  .lvl-head h3{margin:0;font-size:15px;font-weight:700;flex:1}
  .tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;border:1px solid var(--line);color:var(--dim);white-space:nowrap}
  .tag.ok{color:var(--ok);border-color:var(--ok);background:var(--ok-bg)}
  .tag.gold{color:var(--gold-soft);border-color:var(--gold);background:var(--gold-dim)}
  .body{padding:0 15px 16px;display:none}
  .body.open{display:block}
  /* 게이트/스트릭 */
  .gate{border-top:1px solid var(--line);padding-top:13px;margin-bottom:8px}
  .gate-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--dim);margin-bottom:8px}
  .gate-n{color:var(--gold-soft);font-weight:700;font-variant-numeric:tabular-nums}
  .streak{display:flex;gap:6px}
  .seg{height:7px;flex:1;border-radius:4px;background:var(--surface2);border:1px solid var(--line)}
  .seg.on{background:linear-gradient(90deg,var(--gold-soft),var(--gold));border-color:var(--gold)}
  /* 문항 */
  .q{padding:10px 0 4px}
  .qtag{display:inline-block;font-size:11px;color:var(--gold-soft);background:var(--gold-dim);border:1px solid var(--gold);
    border-radius:999px;padding:3px 11px;font-weight:700;margin-bottom:9px}
  .qprompt{margin:0 0 11px;font-weight:700;font-size:15px;line-height:1.5}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;white-space:pre-wrap;
    background:var(--mono-bg);border:1px solid var(--line);border-radius:9px;padding:11px;margin:8px 0;color:var(--ink2)}
  .opt{display:flex;gap:9px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin:7px 0;cursor:pointer;background:var(--surface2)}
  .opt.sel{border-color:var(--gold);background:var(--gold-dim)}
  .opt input{margin-top:3px;accent-color:var(--gold)}
  textarea{width:100%;min-height:96px;background:var(--mono-bg);border:1px solid var(--line);border-radius:9px;color:var(--ink);
    padding:11px;font:13px/1.5 ui-monospace,Menlo,monospace;resize:vertical}
  textarea:focus{outline:none;border-color:var(--gold)}
  .ord-item{padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin:7px 0;background:var(--surface2);display:flex;gap:8px;align-items:center}
  .ord-item button{background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:7px;cursor:pointer;width:28px;height:28px;flex:none}
  .ord-item button:active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-soft)}
  .btn{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#1b1408;border:none;border-radius:10px;
    padding:12px 16px;font-weight:800;font-size:15px;cursor:pointer;margin-top:10px;width:100%}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);font-weight:700}
  .btn:disabled{opacity:.45;cursor:default}
  .verdict{margin-top:11px;padding:12px 13px;border-radius:10px;font-size:14px}
  .verdict.pass{background:var(--ok-bg);border:1px solid var(--ok);color:#cfe9d8}
  .verdict.fail{background:var(--bad-bg);border:1px solid var(--bad);color:#f2cfcc}
  .verdict .vh{font-weight:800;font-size:15px}
  .rub{margin:6px 0;font-size:13px}
  .rub .ok{color:var(--ok);font-weight:700} .rub .no{color:var(--bad);font-weight:700}
  .rmark{font-weight:800;margin-right:4px} .rmark.ok{color:var(--ok)} .rmark.no{color:var(--faint)}
  .rex{color:var(--faint);font-size:11px}
  .givens{background:var(--gold-dim);border:1px solid var(--gold);border-radius:10px;padding:11px 13px;margin:8px 0}
  .givens-h{color:var(--gold-soft);font-size:11px;font-weight:800;margin-bottom:6px}
  .given-row{color:var(--ink2);font-size:13px;line-height:1.6}
  .explain{margin-top:9px;font-size:13px;color:var(--dim);border-left:2px solid var(--line2);padding-left:11px;line-height:1.55}
  .reset{margin-top:26px;font-size:12px;color:var(--faint);text-decoration:underline;cursor:pointer;display:inline-block}
  b{font-weight:700;color:var(--ink)}
  /* 앱 셸 */
  .app{min-height:100dvh}
  .appbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:11px;
    height:calc(58px + env(safe-area-inset-top));padding:env(safe-area-inset-top) 16px 0;
    background:#13110deb;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .appbar .logo{width:38px;height:38px;border-radius:10px;border-width:1px}
  .logo svg{width:21px;height:21px;color:var(--gold-soft)}
  .ab-titles{display:flex;flex-direction:column;justify-content:center;line-height:1.2}
  .appbar h1{font-size:16px;font-weight:800;margin:0}
  .ab-tag{font-size:10.5px;color:var(--dim);margin-top:1px}
  .ab-chip{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:12px;font-weight:800;color:var(--gold-soft);
    background:var(--gold-dim);border:1px solid var(--gold);border-radius:999px;padding:5px 11px;white-space:nowrap}
  #screen{display:block;max-width:680px;margin:0 auto;
    padding:calc(58px + env(safe-area-inset-top) + 16px) 16px calc(76px + env(safe-area-inset-bottom))}
  .navbar{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;
    background:#13110df5;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 9px;
    color:var(--faint);cursor:pointer;font-size:11px;font-weight:700;-webkit-tap-highlight-color:transparent}
  .nav-item.on{color:var(--gold-soft)}
  .nav-ico{line-height:0;opacity:.6}
  .nav-ico svg{width:22px;height:22px}
  .nav-item.on .nav-ico{opacity:1}
  /* 홈 — 이어서 히어로(골드 채움) + 과목 카드(칩) + 힌트 (디자인 이식) */
  .cont{position:relative;background:linear-gradient(135deg,var(--gold-soft),var(--gold));border-radius:18px;
    padding:16px 17px;color:#1b1408;overflow:hidden;cursor:pointer;margin-bottom:6px}
  .cont-eye{font-size:11px;font-weight:800;opacity:.65;letter-spacing:.3px}
  .cont-pill{position:absolute;top:14px;right:14px;font-size:11px;font-weight:800;background:#1b140820;border:1px solid #1b140833;border-radius:999px;padding:3px 10px}
  .cont-title{font-size:21px;font-weight:800;margin:7px 64px 2px 0;letter-spacing:-.3px;line-height:1.25}
  .cont-sub{font-size:12.5px;font-weight:600;opacity:.78;margin-right:64px}
  .cont-play{position:absolute;right:16px;top:54%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;
    background:#1b1408;color:var(--gold-soft);display:flex;align-items:center;justify-content:center}
  .cont-play svg{width:20px;height:20px}
  .cont-seg{display:flex;gap:6px;margin-top:13px}
  .cont-seg span{height:7px;flex:1;border-radius:4px;background:#1b140822;border:1px solid #1b140833}
  .cont-seg span.on{background:#1b1408;border-color:#1b1408}
  .hcard{border:1px solid var(--line);border-radius:15px;background:var(--surface);padding:15px;margin-bottom:10px;cursor:pointer}
  .hc-top{display:flex;align-items:center;gap:12px}
  .hc-ic{width:42px;height:42px;flex:none;border-radius:12px;background:var(--gold-dim);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--gold-soft);line-height:0}
  .hc-ic svg{width:20px;height:20px}
  .hc-name{font-weight:800;font-size:15px}
  .hc-badge{margin-left:7px;font-size:10px;font-weight:800;color:var(--gold-soft);background:var(--gold-dim);border:1px solid var(--gold);border-radius:999px;padding:2px 7px;vertical-align:middle}
  .hc-subs{color:var(--dim);font-size:11.5px;margin-top:2px}
  .hc-go{margin-left:auto;color:var(--gold-soft);font-size:13px;font-weight:700;white-space:nowrap}
  .hc-barrow{display:flex;align-items:center;gap:10px;margin:12px 0 11px}
  .hc-bar{flex:1;height:6px;border-radius:4px;background:var(--surface2);border:1px solid var(--line);overflow:hidden}
  .hc-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold))}
  .hc-stat{color:var(--dim);font-size:11px;white-space:nowrap}
  .hc-chips{display:flex;gap:7px}
  .hc-chip{flex:1;text-align:center;padding:8px 0;border-radius:9px;border:1px solid var(--line);background:var(--surface2);color:var(--dim);font-size:12px;font-weight:700}
  .hc-chip.on{border-color:var(--gold);color:var(--gold-soft);background:var(--gold-dim)}
  .hc-chip.done{border-color:var(--ok);color:var(--ok);background:var(--ok-bg)}
  .hc-chip.lock{opacity:.4}
  .hhint{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:13px;background:var(--surface);
    padding:13px 14px;margin-top:6px;color:var(--dim);font-size:12.5px;line-height:1.5}
  .hhint .hh-ic{width:30px;height:30px;flex:none;border-radius:8px;background:var(--surface2);border:1px solid var(--gold);
    color:var(--gold-soft);display:flex;align-items:center;justify-content:center;font-weight:800}
  /* 트랙 세그먼트 */
  .seg-row{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
  .seg{flex:1;text-align:center;padding:9px 0;border-radius:9px;font-size:13px;font-weight:700;color:var(--dim);cursor:pointer}
  .seg.on{background:var(--gold-dim);color:var(--gold-soft);box-shadow:inset 0 0 0 1px var(--gold)}
  /* 하위분류 칩 */
  .sub-row{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
  .subchip{padding:6px 13px;border-radius:999px;border:1px solid var(--line);background:var(--surface2);color:var(--dim);font-size:12px;font-weight:700;cursor:pointer}
  .subchip.on{border-color:var(--gold);background:var(--gold-dim);color:var(--gold-soft)}
  /* 레벨 스텝퍼 */
  .step-row{display:flex;gap:8px;margin-bottom:14px}
  .step{flex:1;text-align:center;padding:10px 0;border-radius:10px;font-size:13px;font-weight:800;
    border:1px solid var(--line);background:var(--surface2);color:var(--dim);cursor:pointer}
  .step.on{border-color:var(--gold);color:var(--gold-soft);background:var(--gold-dim)}
  .step.done{border-color:var(--ok);color:var(--ok);background:var(--ok-bg)}
  .step.paylock{border-color:var(--gold);border-style:dashed;color:var(--gold-soft)}
  .step.master{flex:0 0 44px;border-color:var(--gold);color:var(--gold-soft)}
  .step.master.on{background:var(--gold-dim)}
  .step.lock{opacity:.4;cursor:default}
  .lv-title{display:flex;align-items:center;gap:9px;font-size:16px;margin-bottom:4px}
  .scr-h{font-size:18px;font-weight:800;margin-bottom:12px}
  .pdot-row{display:flex;gap:6px}
  .pdot{flex:1;text-align:center;padding:8px 0;border-radius:8px;font-size:12px;font-weight:800;
    border:1px solid var(--line);background:var(--surface2);color:var(--dim)}
  .pdot.on{border-color:var(--gold);color:var(--gold-soft)}
  .pdot.done{border-color:var(--ok);color:var(--ok);background:var(--ok-bg)}
  /* 홈 — 이어서(진행 링) + 과목 행 (모두의 자격증 홈 패턴 참고) */
  .tt{text-align:center;margin-bottom:4px}
  .ttring{width:172px;height:172px;border-radius:50%;margin:8px auto 16px;
    background:conic-gradient(var(--gold) calc(var(--p)*1%), var(--surface2) 0);display:grid;place-items:center}
  .ttring .tt-in{width:142px;height:142px;border-radius:50%;background:var(--surface);border:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
  .ttring .tt-big{font-size:2.7rem;font-weight:800;color:var(--gold-soft);letter-spacing:-.03em;line-height:1}
  .ttring .tt-sub{font-size:.86rem;color:var(--dim)}
  .todaycta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:12px;
    padding:14px 18px;cursor:pointer;font-size:15px;font-weight:800;color:#1b1408;background:linear-gradient(180deg,var(--gold-soft),var(--gold))}
  .todaycta:active{transform:translateY(1px)}
  .todaycta .tcta-arrow{font-size:1.2rem}
  .trackcard{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:1px solid var(--line);
    border-radius:13px;background:var(--surface);padding:13px 14px;margin-bottom:9px;cursor:pointer;font:inherit;color:inherit}
  .trackcard:active{border-color:var(--gold)}
  .tc-ic{font-size:1.3rem;width:44px;height:44px;flex:none;display:flex;align-items:center;justify-content:center;
    background:var(--gold-dim);border:1px solid var(--line);border-radius:12px}
  .tc-main{flex:1;min-width:0}
  .tc-label{display:block;font-weight:700;font-size:15px;color:var(--ink)}
  .tc-meta{display:block;color:var(--dim);font-size:11px;margin-top:3px}
  .tc-main .bar{display:block;height:6px;border-radius:4px;background:var(--surface2);border:1px solid var(--line);overflow:hidden;margin:7px 0 0}
  .tc-main .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold))}
  .tc-arrow{color:var(--faint);font-size:1.5rem;flex:none}
  /* 로직크래프트 회사 로고 (웹 전용) */
  .lc-mark{display:none}
  .lc-footer{display:none}
  body.web .lc-footer{display:flex;flex-direction:column;align-items:center;gap:11px;text-align:center;
    margin:28px 0 6px;padding:22px 16px;border-top:1px solid var(--line);color:var(--dim)}
  .lc-foot-logo{height:24px;background:#fff;border-radius:10px;padding:9px 14px;box-sizing:content-box}
  .lc-foot-links{font-size:12.5px} .lc-foot-links a{color:var(--dim);text-decoration:none}
  .lc-foot-links a:hover{color:var(--gold-soft)}
  .lc-foot-copy{font-size:11px;color:var(--faint)}
  /* 데스크톱 웹 레이아웃 — 상단 가로 네비 + 넓은 컨테이너 + 과목 2열 */
  @media(min-width:860px){
    .app{display:flex;flex-direction:column;min-height:100dvh}
    .appbar{position:sticky;order:1;height:62px;padding:0 28px;max-width:none}
    .navbar{position:sticky;top:62px;order:2;bottom:auto;flex-direction:row;justify-content:center;gap:6px;
      border-top:none;border-bottom:1px solid var(--line);padding:7px 0;padding-bottom:7px}
    .nav-item{flex:0 0 auto;flex-direction:row;gap:8px;padding:9px 16px;border-radius:10px;font-size:13px}
    body.web .nav-item.on{background:var(--gold-dim)}
    .nav-ico svg{width:18px;height:18px}
    #screen{order:3;align-self:center;width:100%;max-width:940px;padding:26px 28px 12px}
    .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
    .cont-title{font-size:24px}
    body.web .lc-mark{display:inline-flex;align-items:center;gap:7px;margin-left:14px;text-decoration:none}
    body.web .lc-mark img{height:20px;display:block;background:#fff;border-radius:7px;padding:4px 7px;box-sizing:content-box}
    body.web .lc-mark-txt{color:var(--dim);font-size:12.5px;font-weight:700}
    body.web .lc-mark:hover .lc-mark-txt{color:var(--gold-soft)}
  }
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7l5 5-5 5"/><path d="M15 7v10"/></svg></div>
    <div class="ab-titles"><h1>프롬프트 도장</h1><div class="ab-tag">읽지 말고 망가뜨리고 고친다</div></div>
    <span id="ab-chip" class="ab-chip"></span>
  </header>
  <main id="screen"></main>
  <nav class="navbar" id="nav"></nav>
</div>

<script src="iap.js"></script>
<script>
//#GEN-START  (이 구간은 DOM 비의존 — node 스모크 테스트로 검증)

// ---------- 채점 엔진 (LLM 없음, 전부 결정론) ----------
function normalize(s){ return (s||"").toLowerCase().replace(/\s+/g," ").trim(); }
function detect(text, rule){
  const t = normalize(text);
  if(rule.any) return rule.any.some(k => t.includes(normalize(k)));
  if(rule.all) return rule.all.every(k => t.includes(normalize(k)));
  if(rule.minLen) return (text||"").trim().length >= rule.minLen;
  if(rule.example) return /(예\s*[:：]|예시|e\.?g\.?|보기\s*[:：]|[\[\("'][^\]\)"']{2,})/i.test(text||"");
  return false;
}

// ---------- 시드 기반 PRNG ----------
function rng(seed){
  let s = (seed|0) || 1;
  return function(){

// 살러드 탐지: 키워드 나열형(연결어 적고 짧은 토큰 많음 / 반복)을 통계로 잡는다
function looksLikeSalad(text){
  const t=(text||"").trim();
  const tokens=t.split(/[\s,、·\/]+/).filter(Boolean);
  if(tokens.length<6) return false;
  const shortRatio=tokens.filter(w=>w.length<=2).length/tokens.length;
  const uniqRatio=new Set(tokens).size/tokens.length;
  const conn=["로","으로","를","을","에서","에게","에","의","와","과","하고","해서","하라","해줘","하세요","세요","포함","작성","정리","반환","이내","처럼","같이","마다","으며","하며","면서"];
  const connDensity=tokens.filter(w=>conn.some(c=>w.includes(c))).length/tokens.length;
  return (shortRatio>0.55 && connDensity<0.2) || uniqRatio<0.5;
}

function genCompare(track, stage, rnd, sub){
  const b=BANK[track][stage], fluff=FLUFF[track][stage];
  const seed=pick(rnd,bySub(b.seeds,sub)), rel=seed.rel;
  const strong=shuffle(rnd, rel.map(id=>seed.facts[id]));
  const dropId=pick(rnd, rel);
  const weak=shuffle(rnd, rel.filter(id=>id!==dropId).map(id=>seed.facts[id]).concat([pick(rnd,fluff)]));
  const strongIsA=rnd()<0.5;
  const A=strongIsA?strong:weak, B=strongIsA?weak:strong, better=strongIsA?"A":"B";
  const distract=pick(rnd, b.distract);
  const missOpts=shuffle(rnd, rel.map(id=>({id,label:b.comps[id].opt})).concat([{id:distract.id,label:distract.opt}]));
  return {type:"compare",
    prompt:"두 프롬프트 중 더 나은 것을 고르고, 약한 쪽이 빠뜨린 핵심을 고르세요.",
    task:seed.text, A, B, better, missOpts, missing:dropId,
    explain:"약한 쪽은 ["+b.comps[dropId].rub+"]를 빠뜨리고 군더더기로 채웠어요. 빠진 걸 채운 쪽이 좋은 프롬프트예요."};
}
function genDiagnoseCtxFmt(track, stage, rnd, sub){
  const b = BANK[track][stage];
  const seed = pick(rnd, bySub(b.seeds,sub));
  const correct = seed.rel.map(id => ({id, label:b.comps[id].opt}));
  const dist = shuffle(rnd, b.distract).slice(0,2);
  const opts = shuffle(rnd, correct.concat(dist.map(d=>({id:d.id,label:d.opt}))));
  const out = seed.rel.map(id => b.comps[id].out).join("; ");
  const tip = stage==="ctx"
    ? "상황(무엇을·어디서·왜)이 비면 AI는 추측만 해요. 빠진 핵심만 짚으세요. 형식·말투는 이 단계 문제가 아니에요."
    : "내용이 아니라 모양이 문제예요. 형식·항목·예시를 정해주면 결과가 깔끔하게 나와요. 대상·말투는 이 단계 문제가 아니에요.";
  const model=seed.model || (seed.rel.map(id=>seed.facts[id]).join(", ")+", "+seed.text);
  return {type:"diagnose",
    prompt:`아래 프롬프트로 이런 결과가 나왔어요. 이 과제에서 가장 크게 빠진 것은? (정답 ${seed.rel.length}개)`,
    bad:seed.text, out:'"'+out+'"', opts, correct:seed.rel, explain:tip, model};
}
function genFixCtxFmt(track, stage, rnd, sub){
  const b = BANK[track][stage];
  const seed = pick(rnd, bySub(b.seeds,sub));
  const rubric = seed.rel.map(id => ({id, label:b.comps[id].rub, rule:b.comps[id].rule}));
  const prompt = stage==="ctx"
    ? "아래 주어진 정보를 담아, AI가 추측하지 않게 프롬프트를 고쳐 보세요."
    : "아래 주어진 정보를 담아, 출력 형식을 정해 고쳐 보세요.";
  const tip = stage==="ctx" ? "대상·증상·목표·환경을 채우면 AI가 추측을 멈춰요." : "형식·항목·예시를 정해주면 결과가 표 한 줄로 깔끔하게 나와요.";
  const facts=seed.rel.map(id=>seed.facts[id]);
  const model=seed.model || (facts.join(", ")+", "+seed.text);   // seed.model = 손으로 다듬은 자연스러운 모범 프롬프트
  return {type:"fix", prompt, seed:seed.text, rubric, explain:tip, model, facts};
}

}

function genRubricGoal(track, rnd, sub){
  const g = BANK[track].goal;
  const e = pick(rnd, bySub(g.vbank, sub));
  const model='"'+e.task+'" — '+e.ok.join(", ")+'를 만족시키고, '+e.vague.join("·")+' 같은 모호한 표현은 금지.';
  return {type:"rubric",
    prompt:'"'+e.task+'"에 대해, 통과/실패를 딱 잘라 판정할 수 있는 프롬프트를 작성하세요.',
    rubric:g.rubricComps,
    explain:"합격 조건·구체 예시·금지를 정해주면 결과가 맞았는지 직접 확인할 수 있어요.", model};
}
function genVerif(track, rnd, sub){
  const e = pick(rnd, bySub(BANK[track].goal.vbank, sub));
  const ok = e.ok.map((t,i)=>({id:"k"+i, label:t}));
  const vague = e.vague.map((t,i)=>({id:"g"+i, label:t}));
  return {type:"diagnose",
    prompt:"목표: "+e.task+`. 통과/실패로 판정 가능한 조건을 모두 고르세요. (정답 ${e.ok.length}개)`,
    bad:"목표 = "+e.task, out:"(검증 가능한 조건만 고르세요)",
    opts:shuffle(rnd, ok.concat(vague)), correct:ok.map(o=>o.id),
    explain:"통과/실패를 딱 잘라 판정할 수 있어야 해요. '우아하게'·'빠르게' 같은 형용사는 기준이 못 돼요."};
}
const RECOG_UNTIL = 3;   // 숙련도 0~2: 인지(객관식)만, 3+: 생산(주관식) 등장
function genQuestion(track, li, seed, sub, mastery){
  const rnd = rng(seed);
  const key = LEVELS[li].key;
  const recog = (mastery==null ? 99 : mastery) < RECOG_UNTIL;   // 낮은 숙련도 = 객관식, 높으면 주관식
  if(key==="ctx"||key==="fmt"){
    if(recog) return (rnd()<0.5) ? genDiagnoseCtxFmt(track,key,rnd,sub) : genCompare(track,key,rnd,sub);  // 둘 다 객관식
    const r=rnd();
    if(r<0.25) return genDiagnoseCtxFmt(track,key,rnd,sub);
    if(r<0.45) return genCompare(track,key,rnd,sub);
    return genFixCtxFmt(track,key,rnd,sub);   // 생산형(고치기)
  }
  if(key==="proc"){
    if(recog) return genOrder(track, rnd, sub);                 // 객관식(순서)
    return (rnd()<0.4) ? genOrder(track, rnd, sub) : genReasonFix(track, rnd, sub);
  }
  // goal
  if(recog) return genVerif(track, rnd, sub);                   // 객관식(검증 가능 조건 고르기)
  return (rnd()<0.4) ? genVerif(track, rnd, sub) : genRubricGoal(track, rnd, sub);
}

state.streak = state.streak || {};          // 세션 외 연속(홈 히어로 표시용)
state.seedFor = state.seedFor || {};

state.best = state.best || {};             // 과목별 마스터 최고 연속

const lk = (t,li)=>`${t}.${li}`;
function masteryOf(t,li){ return state.mastery[lk(t,li)]||0; }
function isMastered(t,li){ return masteryOf(t,li)>=MASTER_N; }
function allMastered(t){ return LEVELS.every((_,i)=>isMastered(t,i)); }
function unlocked(t,li){ return true; }    // 강제 순서 제거 — 접근은 결제(paidOk)만 좌우
function seedFor(t,li){
  const k=lk(t,li);
  if(!state.seedFor[k]){ state.seedCtr++; state.seedFor[k]=state.seedCtr; save(); }
  return state.seedFor[k];
}
function newSeed(t,li){ state.seedCtr++; state.seedFor[lk(t,li)]=state.seedCtr; save(); }
function onGrade(t,li,ok){
  if(ok) state.solved++;
  if(li==="m"){   // 마스터 모드: 숙련도 누적 없이 연속·최고만 기록
    if(ok){ masteryStreak[t]=(masteryStreak[t]||0)+1; state.best[t]=Math.max(state.best[t]||0, masteryStreak[t]); }
    else masteryStreak[t]=0;
    save(); return;
  }
  const k=lk(t,li);
  if(ok){ state.mastery[k]=(state.mastery[k]||0)+1; state.streak[k]=(state.streak[k]||0)+1; }
  else { state.streak[k]=0; }   // 숙련도는 누적(감점 없음), 연속만 리셋
  save();
}

  // 진행 잠금: 아직 못 푸는 레벨이면 현재 풀 수 있는 레벨로
  if(!unlocked(curTrack, selLevel[curTrack])) selLevel[curTrack]=defaultLevel(curTrack);
  s.appendChild(levelStepper());
  const li=selLevel[curTrack];
  const card=el("div","lvl"); card.style.padding="14px 15px";
  const h=el("div","lv-title"); h.innerHTML=`<span class="lv-badge num">${li+1}</span><b>스킬 ${li+1} · ${LEVELS[li].name}</b>`;
  card.appendChild(h);
  const why=el("div","explain"); why.style.margin="0 0 4px"; why.textContent=LEVELS[li].why; card.appendChild(why);
  const gate=el("div","gate"); gate.innerHTML=gateHTML(curTrack,li);
  card.appendChild(gate);
  card.appendChild(renderQ(genQuestion(curTrack,li,seedFor(curTrack,li),undefined,masteryOf(curTrack,li)), curTrack, li, gate));
  s.appendChild(card);
  return s;
}

  const h=el("div","scr-h"); h.textContent="좋은 프롬프트란?"; s.appendChild(h);

  card(`<b>왜 — AI가 답하는 방식</b><div class="explain" style="margin-top:7px">기준은 취향이 아니라 AI가 답을 만드는 방식에서 나옵니다.<br>① AI는 내가 준 말만 보고 다음 말을 이어 써요 — 안 주면 흔한 쪽으로 채웁니다<br>② 한 번에 생각하는 양이 정해져 있어요 — 복잡하면 단계로 풀게 해야 합니다<br>③ 대화 밖의 일은 몰라요 — 자료·역할·합격 기준은 내가 줘야 합니다</div>`);
  card(`<b>좋은 프롬프트의 5가지</b>

    <div class="explain" style="margin-top:8px"><b style="color:var(--gold-soft)">2. 필요한 자료·역할을 준다</b><br>안 준 건 AI가 몰라요 (③)</div>
    <div class="explain" style="margin-top:8px"><b style="color:var(--gold-soft)">3. 원하는 출력 모양을 정한다</b><br>목록·표·길이·예시 (①)</div>
    <div class="explain" style="margin-top:8px"><b style="color:var(--gold-soft)">4. 어려우면 단계로 풀게 한다</b><br>AI는 한 번에 생각하는 양이 한정적이에요 (②)</div>
    <div class="explain" style="margin-top:8px"><b style="color:var(--gold-soft)">5. 합격 기준을 준다</b><br>AI는 스스로 채점하지 못해요 (③)</div>`);
  card(`<b>5가지는 그대로, 방법은 AI마다 달라요</b><div class="explain" style="margin-top:7px">이 5가지는 어떤 AI에도 통합니다. 다만 구체적 방법은 AI·버전마다 달라요 — 예시를 몇 개 줄지, '단계로 생각해'를 붙일지(똑똑한 추론 AI는 안 붙여도 됨), 형식 쓰는 법 등. 이 앱은 변하지 않는 5가지를 연습합니다.</div>`);
  const back=el("button","btn ghost"); back.textContent="← 홈으로"; back.onclick=()=>nav("home"); s.appendChild(back);
  return s;
}

    s.appendChild(ok);
  } else {
    s.appendChild(renderPaywall(1));
  }
  // ── 안내 ── (닻은 #guide가 정본 — 여기선 링크)

  const note=el("div","explain"); note.style.marginTop="10px";
  note.textContent="채점은 전부 기기 안에서 바로 됩니다 (인터넷·AI 없이). '좋은 프롬프트'에 점수를 매기는 게 아니라, 위 5가지가 빠짐없이 들었는지를 연습합니다.";
  s.appendChild(note);
  let done=0; ["basics","coding","writing","video"].forEach(tk=>LEVELS.forEach((_,li)=>{ if(isMastered(tk,li))done++; }));
  const stat=el("div","explain"); stat.style.marginTop="14px";
  stat.textContent=`익힌 스킬 ${done} / ${LEVELS.length*4} · 지금까지 ${state.solved}문제 맞힘`;
  s.appendChild(stat);
  const reset=el("button","btn ghost"); reset.textContent="진행 초기화"; reset.style.marginTop="14px"; reset.onclick=resetAll;
  s.appendChild(reset);
  const ver=el("div","explain"); ver.style.marginTop="14px"; ver.textContent="프롬프트 도장 · v0.1 · by LogicCraft";
  s.appendChild(ver);
  return s;

// 항목 충족 힌트 — 어떤 단어/형식이 채점에 잡히는지 (실제 detect 규칙 기반)
function ruleHint(rule){
  if(rule.any) return "예: "+rule.any.slice(0,3).join("·")+" 등";
  if(rule.example) return "예: \"예: …\" 처럼 구체 예시";
  if(rule.minLen) return "구체적으로 충분히 길게";
  return "";
}
let qcounter=0;
function renderQ(q,t,li,gateEl){
  const uid=++qcounter;
  const wrap=document.createElement("div"); wrap.className="q";
  const tags={diagnose:"진단",fix:"고치기",order:"순서",rubric:"루브릭",compare:"짝 비교"};
  wrap.innerHTML=`<span class="qtag">유형 · ${tags[q.type]}</span><div class="qprompt">${q.prompt}</div>`;
  let getResult; // ()=>{ok, detail}

  if(q.type==="compare"){
    wrap.innerHTML+=`<div class="mono">과제: ${q.task}</div>`;
    const t1=document.createElement("div"); t1.className="explain"; t1.textContent="① 더 나은 프롬프트는?";
    wrap.appendChild(t1);
    const blocks=document.createElement("div");
    [["A",q.A],["B",q.B]].forEach(([L,lines])=>{
      const lab=document.createElement("label"); lab.className="opt";
      lab.innerHTML=`<input type="radio" name="better_${uid}" value="${L}"><div style="flex:1"><b>프롬프트 ${L}</b><div class="mono" style="margin:6px 0 0">${lines.map(x=>"· "+x).join("\n")}</div></div>`;
      lab.querySelector("input").onchange=()=>{ blocks.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel")); lab.classList.add("sel"); };
      blocks.appendChild(lab);
    });
    wrap.appendChild(blocks);
    const t2=document.createElement("div"); t2.className="explain"; t2.textContent="② 약한 쪽이 빠뜨린 핵심은?";
    wrap.appendChild(t2);
    const mbox=document.createElement("div");
    q.missOpts.forEach(o=>{
      const lab=document.createElement("label"); lab.className="opt";
      lab.innerHTML=`<input type="radio" name="missing_${uid}" value="${o.id}"><span>${o.label}</span>`;
      lab.querySelector("input").onchange=()=>{ mbox.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel")); lab.classList.add("sel"); };
      mbox.appendChild(lab);
    });
    wrap.appendChild(mbox);
    getResult=()=>{
      const better=wrap.querySelector(`input[name="better_${uid}"]:checked`);
      const miss=wrap.querySelector(`input[name="missing_${uid}"]:checked`);
      if(!better||!miss) return {ok:false, detail:"두 가지를 모두 선택해야 합니다."};
      const ok = better.value===q.better && miss.value===q.missing;
      const reveal=()=>{
        blocks.querySelectorAll(".opt").forEach(l=>{ const i=l.querySelector("input"); i.disabled=true;
          if(i.value===q.better) l.style.borderColor="var(--ok)"; });
        mbox.querySelectorAll(".opt").forEach(l=>{ const i=l.querySelector("input"); i.disabled=true;
          if(i.value===q.missing){ l.style.borderColor="var(--ok)"; l.insertAdjacentHTML("beforeend",'<span style="margin-left:auto;color:var(--ok);font-weight:700;font-size:12px">정답</span>'); } });
      };
      return {ok, detail: ok?"정확하다.":"정답을 아래에 표시했어요.", reveal};
    };
  }

  if(q.type==="diagnose"){
    wrap.innerHTML+=`<div class="mono">프롬프트: ${q.bad}\n결과: ${q.out}</div>`;
    const box=document.createElement("div");
    q.opts.forEach(o=>{
      const d=document.createElement("label"); d.className="opt";
      d.innerHTML=`<input type="checkbox" value="${o.id}"><span>${o.label}</span>`;
      d.querySelector("input").onchange=e=>d.classList.toggle("sel",e.target.checked);
      box.appendChild(d);
    });
    wrap.appendChild(box);
    getResult=()=>{
      const sel=[...box.querySelectorAll("input:checked")].map(i=>i.value).sort();
      const ok=JSON.stringify(sel)===JSON.stringify([...q.correct].sort());
      const reveal=()=>{
        box.querySelectorAll(".opt").forEach(l=>{ const i=l.querySelector("input"); i.disabled=true;
          if(q.correct.includes(i.value)){ l.style.borderColor="var(--ok)"; l.insertAdjacentHTML("beforeend",'<span style="margin-left:auto;color:var(--ok);font-weight:700;font-size:12px">핵심</span>'); }
          else if(i.checked){ l.style.borderColor="var(--bad)"; l.insertAdjacentHTML("beforeend",'<span style="margin-left:auto;color:var(--bad);font-weight:700;font-size:12px">아님</span>'); }
        });
      };
      const hit=sel.filter(x=>q.correct.includes(x)).length;
      return {ok, reveal, detail: ok?`정확히 짚었다 — 핵심 ${q.correct.length}개 전부.`:`핵심 ${q.correct.length}개 중 ${hit}개만. 정답을 표시했어요.`};
    };
  }

  if(q.type==="fix"||q.type==="rubric"){
    if(q.type==="fix"){
      wrap.innerHTML+=`<div class="mono">약한 프롬프트: ${q.seed}</div>`;
      if(q.facts) wrap.innerHTML+=`<div class="givens"><div class="givens-h">주어진 정보 — 이 내용을 프롬프트에 담으세요</div>`+
        q.facts.map(f=>`<div class="given-row">· ${f}</div>`).join("")+`</div>`;
    }
    const ta=document.createElement("textarea");
    ta.value="";
    ta.placeholder=q.type==="fix"?"주어진 정보를 담아 프롬프트를 다시 써 보세요":"여기에 사양서형 프롬프트를 작성하세요";
    wrap.appendChild(ta);
    const help=el("div","explain");
    help.innerHTML="아래 항목이 들어가도록 <b>자연스러운 지시문</b>으로 쓰세요. 쓰는 동안 충족되면 ✓ 가 켜집니다.";
    wrap.appendChild(help);
    const liveEls=[];
    q.rubric.forEach(r=>{
      const row=el("div","rub");
      row.innerHTML=`<span class="rmark no">○</span> ${r.label} <span class="rex">${ruleHint(r.rule)}</span>`;
      liveEls.push({r,row}); wrap.appendChild(row);
    });
    const refreshLive=()=>{ liveEls.forEach(({r,row})=>{ const ok=detect(ta.value,r.rule); const m=row.querySelector(".rmark"); m.textContent=ok?"✓":"○"; m.className="rmark "+(ok?"ok":"no"); }); };
    ta.addEventListener("input", refreshLive); refreshLive();
    getResult=()=>{
      const res=q.rubric.map(r=>({label:r.label, ok:detect(ta.value,r.rule)}));
      const salad=looksLikeSalad(ta.value);
      if(salad) res.forEach(r=>{ r.ok=false; });
      const all=res.every(r=>r.ok);
      const met=res.filter(r=>r.ok).length;
      let detail=`<div style="font-weight:800;font-size:15px;margin-bottom:6px">핵심 ${met} / ${res.length} 충족</div>`;
      detail+=res.map(r=>`<div class="rub"><span class="${r.ok?'ok':'no'}">${r.ok?'✓':'○'}</span> ${r.label}</div>`).join("");
      if(salad) detail+=`<div class="rub no">⚠ 키워드 나열처럼 보입니다 — 자연스러운 지시문으로 쓰세요.</div>`;
      return {ok:all, detail};
    };
  }

  if(q.type==="order"){
    let order=q.items.map(i=>i.id);
    const list=document.createElement("div");
    function draw(){
      list.innerHTML="";
      order.forEach((id,idx)=>{
        const it=q.items.find(x=>x.id===id);
        const row=document.createElement("div"); row.className="ord-item";
        row.innerHTML=`<button>▲</button><button>▼</button><span>${it.label}</span>`;
        const [up,down]=row.querySelectorAll("button");
        up.onclick=()=>{ if(idx>0){[order[idx-1],order[idx]]=[order[idx],order[idx-1]];draw();} };
        down.onclick=()=>{ if(idx<order.length-1){[order[idx+1],order[idx]]=[order[idx],order[idx+1]];draw();} };
        list.appendChild(row);
      });
    }
    draw(); wrap.appendChild(list);
    getResult=()=>{
      const ok=JSON.stringify(order)===JSON.stringify(q.order);
      return {ok, detail: ok?"순서가 맞다.":"절차 순서를 다시 보라."};
    };
  }

  const btn=document.createElement("button"); btn.className="btn"; btn.textContent="채점하기";
  wrap.appendChild(btn);
  btn.onclick=()=>{
    const {ok,detail,reveal}=getResult();
    btn.disabled=true;
    if(typeof reveal==="function") reveal();
    onGrade(t,li,ok);
    if(gateEl) gateEl.innerHTML=gateHTML(t,li);
    const v=document.createElement("div"); v.className="verdict "+(ok?"pass":"fail");
    v.innerHTML=`<span class="vh">${ok?"통과":"다시"}</span>`+(detail?`<div style="margin-top:6px">${detail}</div>`:"")
      +`<div class="explain">${q.explain}</div>`
      +(q.model?`<div class="explain" style="border-left-color:var(--gold);margin-top:8px"><b style="color:var(--gold-soft)">모범 예시</b><br>${q.model}</div>`:"");
    wrap.appendChild(v);
    const onMastered = li!=="m" && isMastered(t,li);
    if(onMastered){
      if(ok && masteryOf(t,li)===MASTER_N){ const msg=el("div","explain"); msg.style.color="var(--ok)"; msg.textContent="이 스킬을 익혔어요 ★"; wrap.appendChild(msg); }
      let nx=-1; for(let i=0;i<LEVELS.length;i++){ if(!isMastered(t,i)){ nx=i; break; } }
      if(nx!==-1){
        const go=el("button","btn"); go.textContent=`다음 스킬: ${LEVELS[nx].name} →`;
        go.onclick=()=>{ selLevel[t]=nx; rerender(); }; wrap.appendChild(go);
      } else {
        const go=el("button","btn"); go.textContent="마스터 모드 ★ 도전";
        go.onclick=()=>{ selLevel[t]="m"; rerender(); }; wrap.appendChild(go);
      }
    }
    const next=el("button","btn ghost"); next.textContent= onMastered ? "이 스킬 더 풀기 →" : "다음 문제 →";
    next.onclick=()=>{ newSeed(t,li); rerender(); }; wrap.appendChild(next);
  };
  return wrap;
}

function resetAll(){
  if(confirm("진행상황을 모두 지울까요?")){
    state={mastery:{},streak:{},seedFor:{},seedCtr:1,solved:0,best:{}}; save(); selLevel={basics:0,coding:0,writing:0,video:0}; rerender();
  }
}
