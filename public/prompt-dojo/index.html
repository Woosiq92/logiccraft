<style>

  :root{
    --bg:#13110d; --bg2:#0f0d0a;
    --surface:#1c1813; --surface2:#221f1a; --surface3:#262019;
    --line:#3a342a; --line-soft:#2a251e;
    --text:#e7e1d7; --muted:#9b948a; --dim:#6c665c;
    --gold:#d8a44a; --gold-bright:#e9c479; --gold-deep:#c08e32;
    --pass:#7fd3a4; --pass-bg:rgba(127,211,164,.10); --pass-line:rgba(127,211,164,.40);
    --fail:#e88a84; --fail-bg:rgba(232,138,132,.09); --fail-line:rgba(232,138,132,.40);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --r-lg:18px; --r-md:14px; --r-sm:10px;
    --maxw:1180px;
    --shadow:0 18px 44px rgba(0,0,0,.40);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(216,164,74,.06), transparent 60%),
      var(--bg);
    color:var(--text); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    line-height:1.5; letter-spacing:-.003em;
  }
  ::selection{background:rgba(216,164,74,.28);}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  .mono{font-family:var(--mono);}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 32px;}

  /* ============ TOP BAR ============ */
  header.topbar{
    position:sticky; top:0; z-index:50;
    background:rgba(15,13,10,.82); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line-soft);
  }
  .topbar-inner{display:flex; align-items:center; gap:28px; height:66px;}
  .brand{display:flex; align-items:center; gap:11px; flex-shrink:0;}
  .mark{
    width:38px; height:38px; border-radius:11px; border:1.5px solid var(--gold);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    box-shadow:inset 0 0 16px rgba(216,164,74,.16);
  }
  .mark .chev{font-family:var(--mono); font-size:18px; font-weight:700; color:var(--gold-bright); line-height:1; margin-left:-1px;}
  .mark .cursor{width:5px; height:15px; background:var(--gold-bright); margin-left:2px; border-radius:1px; animation:blink 1.15s steps(1) infinite;}
  @keyframes blink{0%,55%{opacity:1;}56%,100%{opacity:0;}}
  .brand .name{font-size:16px; font-weight:750; letter-spacing:-.01em;}
  nav.mainnav{display:flex; align-items:center; gap:4px; flex:1;}
  nav.mainnav a{
    font-size:14px; font-weight:550; color:var(--muted);
    padding:8px 14px; border-radius:9px; transition:.15s; position:relative;
  }
  nav.mainnav a:hover{color:var(--text); background:var(--surface);}
  nav.mainnav a.active{color:var(--gold-bright);}
  nav.mainnav a.active::after{
    content:""; position:absolute; left:14px; right:14px; bottom:-1px; height:2px;
    background:var(--gold); border-radius:2px;
  }
  .credit{
    display:flex; align-items:center; gap:8px; flex-shrink:0;
    padding:6px 6px 6px 12px; border:1px solid var(--line-soft); border-radius:30px;
  }
  .credit .by{font-size:11px; color:var(--dim); white-space:nowrap;}
  .lc-plaque{
    display:flex; align-items:center; gap:6px; background:#fff; color:#13110d;
    border-radius:20px; padding:4px 11px 4px 8px;
  }
  .lc-dot{width:16px; height:16px; object-fit:contain; flex-shrink:0; display:block;}
  .lc-plaque span{font-size:12.5px; font-weight:750; letter-spacing:-.01em; color:#000;}

  /* ============ SCREEN SYSTEM ============ */
  .screen{display:none; animation:fade .35s ease;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  section.block{padding:0 0 0;}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.26em; color:var(--dim); font-weight:600; text-transform:uppercase;}

  /* ============ HOME ============ */
  .home-head{padding:54px 0 30px;}
  .home-head h1{font-size:34px; font-weight:800; letter-spacing:-.025em; margin:14px 0 0; line-height:1.1;}
  .home-head p{font-size:15px; color:var(--muted); margin:12px 0 0; max-width:560px;}

  .home-grid{display:grid; grid-template-columns:1.55fr 1fr; gap:20px; align-items:stretch;}

  /* hero resume */
  .hero{
    position:relative; overflow:hidden; border-radius:var(--r-lg);
    background:
      radial-gradient(420px 220px at 86% 8%, rgba(232,184,90,.16), transparent 70%),
      linear-gradient(150deg,#241d12,#1a1611);
    border:1px solid var(--line); padding:30px 32px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .hero .htag{display:flex; align-items:center; gap:10px;}
  .pill{
    font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em;
    color:var(--gold-bright); background:rgba(216,164,74,.12);
    border:1px solid rgba(216,164,74,.32); border-radius:30px; padding:5px 12px;
  }
  .hero h2{font-size:28px; font-weight:800; letter-spacing:-.02em; margin:18px 0 0; line-height:1.12;}
  .hero .sub{font-size:14px; color:var(--muted); margin:8px 0 0;}
  .meter-row{display:flex; align-items:center; gap:14px; margin-top:26px;}
  .meter{flex:1;}
  .meter .mlabel{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:9px;}
  .meter .mlabel b{color:var(--gold-bright); font-family:var(--mono); font-weight:700;}
  .pips{display:flex; gap:7px;}
  .pip{flex:1; height:8px; border-radius:5px; background:var(--surface3); border:1px solid var(--line-soft);}
  .pip.on{background:linear-gradient(90deg,var(--gold),var(--gold-bright)); border-color:transparent; box-shadow:0 0 12px rgba(216,164,74,.35);}
  .pip.next{border:1px dashed var(--line); background:transparent; animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(216,164,74,.4);}50%{box-shadow:0 0 0 4px rgba(216,164,74,0);}}
  .btn{
    display:inline-flex; align-items:center; gap:9px; font-size:15px; font-weight:700;
    padding:14px 24px; border-radius:12px; transition:.16s; white-space:nowrap;
  }
  .btn-gold{background:var(--gold); color:#1c1407; box-shadow:0 8px 20px rgba(216,164,74,.22);}
  .btn-gold:hover{background:var(--gold-bright); transform:translateY(-1px);}
  .btn-ghost{border:1px solid var(--line); color:var(--gold-bright);}
  .btn-ghost:hover{background:var(--surface2); border-color:var(--gold-deep);}
  .hero-foot{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-top:26px;}

  /* good-prompt entry card */
  .entry{
    border-radius:var(--r-lg); border:1px solid var(--line); background:var(--surface);
    padding:28px; display:flex; flex-direction:column;
  }
  .entry .ic{
    width:46px; height:46px; border-radius:12px; background:var(--surface3); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:var(--gold-bright); margin-bottom:18px;
  }
  .entry h3{font-size:19px; font-weight:750; letter-spacing:-.015em; margin:0;}
  .entry p{font-size:13.5px; color:var(--muted); margin:10px 0 0; line-height:1.6;}
  .five-mini{display:flex; flex-wrap:wrap; gap:6px; margin-top:18px;}
  .five-mini span{font-size:12px; color:var(--text); background:var(--surface2); border:1px solid var(--line-soft); border-radius:7px; padding:5px 9px;}
  .entry .lead{margin-top:auto; padding-top:20px;}
  .entry .lead a{font-size:14px; font-weight:650; color:var(--gold-bright); display:inline-flex; align-items:center; gap:7px;}
  .entry .lead a:hover{gap:11px;}

  /* subjects */
  .subjects-head{display:flex; align-items:center; gap:14px; margin:46px 0 18px;}
  .subjects-head .line{flex:1; height:1px; background:var(--line-soft);}
  .subj-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .subj{
    border-radius:var(--r-lg); border:1px solid var(--line); background:var(--surface);
    padding:24px; transition:.18s; cursor:pointer;
  }
  .subj:hover{border-color:var(--gold-deep); transform:translateY(-3px); box-shadow:var(--shadow);}
  .subj-top{display:flex; align-items:center; gap:15px;}
  .subj-ic{width:50px; height:50px; border-radius:13px; background:var(--surface3); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--gold-bright); flex-shrink:0;}
  .subj-title{flex:1; min-width:0;}
  .subj-title .t{font-size:18px; font-weight:750; display:flex; align-items:center; gap:9px;}
  .free-tag{font-size:10.5px; font-weight:700; color:var(--pass); background:var(--pass-bg); border:1px solid var(--pass-line); border-radius:20px; padding:2px 8px;}
  .subj-title .d{font-size:13px; color:var(--muted); margin-top:4px;}
  .subj-prog{display:flex; align-items:center; gap:12px; margin-top:20px;}
  .bar{flex:1; height:7px; border-radius:5px; background:var(--surface3); overflow:hidden;}
  .bar > i{display:block; height:100%; border-radius:5px; background:linear-gradient(90deg,var(--gold),var(--gold-bright));}
  .subj-prog .pct{font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap;}
  .chips{display:flex; gap:7px; margin-top:16px;}
  .chip{flex:1; text-align:center; font-family:var(--mono); font-size:11px; font-weight:600; padding:7px 0; border-radius:8px; background:var(--surface2); border:1px solid var(--line-soft); color:var(--dim);}
  .chip.done{color:#1c1407; background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep)); border-color:transparent;}
  .chip.cur{color:var(--gold-bright); background:rgba(216,164,74,.10); border-color:rgba(216,164,74,.4);}
  .chip.star{flex:0 0 42px;}

  /* ============ LEARNING ============ */
  .learn-layout{display:grid; grid-template-columns:280px 1fr; gap:34px; padding:40px 0 70px; align-items:start;}
  .rail{position:sticky; top:90px; display:flex; flex-direction:column; gap:18px;}
  .rail .card{border:1px solid var(--line); background:var(--surface); border-radius:var(--r-md); padding:20px;}
  .back-link{font-size:13px; color:var(--muted); display:inline-flex; align-items:center; gap:7px;}
  .back-link:hover{color:var(--text);}
  .stepper{display:flex; flex-direction:column; gap:3px;}
  .step{display:flex; align-items:center; gap:12px; padding:9px 8px; border-radius:9px;}
  .step .dot{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:12px; font-weight:700; flex-shrink:0; border:1.5px solid var(--line); color:var(--dim);}
  .step.done .dot{background:var(--pass-bg); border-color:var(--pass-line); color:var(--pass);}
  .step.cur{background:rgba(216,164,74,.08);}
  .step.cur .dot{border-color:var(--gold); color:var(--gold-bright); box-shadow:0 0 0 3px rgba(216,164,74,.12);}
  .step .stx{font-size:13.5px; font-weight:600; color:var(--muted);}
  .step.cur .stx{color:var(--text);}
  .step.done .stx{color:var(--muted);}
  .step .stx small{display:block; font-size:11px; font-weight:500; color:var(--dim); margin-top:1px;}
  .rail-why{font-size:12.5px; color:var(--muted); line-height:1.65;}
  .rail-why b{color:var(--gold-bright); font-weight:650;}

  .learn-main{display:flex; flex-direction:column; gap:22px;}
  .learn-intro h2{font-size:26px; font-weight:800; letter-spacing:-.02em; margin:0;}
  .learn-intro p{font-size:14px; color:var(--muted); margin:10px 0 0; max-width:620px; line-height:1.6;}

  .q-card{border:1px solid var(--line); background:var(--surface); border-radius:var(--r-lg); overflow:hidden;}
  .q-head{display:flex; align-items:center; gap:12px; padding:18px 22px; border-bottom:1px solid var(--line-soft); background:var(--surface2);}
  .qtag{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em; color:var(--gold-bright); background:rgba(216,164,74,.10); border:1px solid rgba(216,164,74,.3); border-radius:7px; padding:4px 10px;}
  .qkind{font-size:12px; color:var(--dim);}
  .q-level{margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--muted);}
  .q-body{padding:24px;}
  .q-stem{font-size:16px; font-weight:650; letter-spacing:-.01em; margin:0 0 18px;}
  .q-stem .accent{color:var(--gold-bright);}

  .code{font-family:var(--mono); font-size:13px; line-height:1.65; background:var(--bg2); border:1px solid var(--line-soft); border-radius:var(--r-sm); padding:14px 16px; color:#cdc6ba; white-space:pre-wrap; overflow-x:auto;}
  .code .cmt{color:var(--dim);}
  .code-label{font-family:var(--mono); font-size:10px; letter-spacing:.16em; color:var(--dim); margin-bottom:8px; text-transform:uppercase;}

  /* options */
  .opts{display:flex; flex-direction:column; gap:10px; margin-top:18px;}
  .opt{display:flex; align-items:flex-start; gap:13px; padding:14px 16px; border:1px solid var(--line-soft); border-radius:var(--r-sm); transition:.14s; cursor:pointer;}
  .opt:hover{border-color:var(--line); background:var(--surface2);}
  .box{width:20px; height:20px; border-radius:6px; border:1.5px solid var(--line); flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-top:1px; font-size:12px;}
  .radio{border-radius:50%;}
  .opt.sel{border-color:var(--gold); background:rgba(216,164,74,.07);}
  .opt.sel .box{background:var(--gold); border-color:var(--gold); color:#1c1407;}
  .opt.sel .radio{background:transparent;}
  .opt.sel .radio::after{content:""; width:9px; height:9px; border-radius:50%; background:var(--gold);}
  .opt .otx{font-size:14px; line-height:1.5;}
  .opt .otx small{display:block; color:var(--muted); font-size:12.5px; margin-top:3px; font-weight:400;}

  /* pair compare */
  .pair{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:6px;}
  .pcol{border:1px solid var(--line-soft); border-radius:var(--r-sm); padding:15px; background:var(--bg2);}
  .pcol.best{border-color:var(--pass-line);}
  .pcol .ptag{display:flex; align-items:center; gap:8px; margin-bottom:11px;}
  .pcol .ab{font-family:var(--mono); font-size:13px; font-weight:700; width:26px; height:26px; border-radius:7px; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--muted);}
  .pcol.best .ab{color:var(--pass); border-color:var(--pass-line);}
  .pcol .pbody{font-size:13px; color:#cdc6ba; line-height:1.6;}
  .subq{font-size:13px; color:var(--muted); margin:20px 0 10px; font-weight:600;}

  /* ordering */
  .order{display:flex; flex-direction:column; gap:9px;}
  .ord{display:flex; align-items:center; gap:14px; padding:13px 15px; border:1px solid var(--line-soft); border-radius:var(--r-sm); background:var(--bg2);}
  .ord .num{font-family:var(--mono); font-size:13px; font-weight:700; color:var(--gold-bright); width:18px; flex-shrink:0;}
  .ord .otx{flex:1; font-size:14px;}
  .ord .arrows{display:flex; flex-direction:column; gap:3px;}
  .ord .arrows button{width:28px; height:20px; border:1px solid var(--line); border-radius:6px; color:var(--muted); font-size:10px; display:flex; align-items:center; justify-content:center; transition:.14s;}
  .ord .arrows button:hover{border-color:var(--gold-deep); color:var(--gold-bright);}
  .ord .arrows button:disabled{opacity:.3; cursor:default;}

  /* fix / rubric */
  .given{border:1px solid var(--line-soft); border-left:3px solid var(--gold); border-radius:0 var(--r-sm) var(--r-sm) 0; background:var(--surface2); padding:14px 16px; margin:6px 0 16px;}
  .given .gl{font-family:var(--mono); font-size:10px; letter-spacing:.14em; color:var(--gold-bright); text-transform:uppercase; margin-bottom:9px;}
  .given ul{margin:0; padding-left:18px; font-size:13.5px; color:var(--text); line-height:1.75;}
  .given ul b{color:var(--gold-bright);}
  textarea.write{
    width:100%; min-height:118px; resize:vertical; font-family:var(--mono); font-size:13.5px; line-height:1.65;
    background:var(--bg2); border:1px solid var(--line); border-radius:var(--r-sm); color:var(--text); padding:14px 16px;
  }
  textarea.write:focus{outline:none; border-color:var(--gold-deep); box-shadow:0 0 0 3px rgba(216,164,74,.1);}
  textarea.write::placeholder{color:var(--dim);}
  .checklist{display:flex; flex-direction:column; gap:9px; margin-top:16px;}
  .check{display:flex; align-items:center; gap:11px; font-size:13.5px;}
  .check .cb{width:20px; height:20px; border-radius:50%; border:1.5px solid var(--line); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--dim);}
  .check.ok .cb{background:var(--pass-bg); border-color:var(--pass-line); color:var(--pass);}
  .check.ok{color:var(--text);}
  .check.no{color:var(--muted);}
  .cl-head{display:flex; align-items:center; justify-content:space-between; margin:18px 0 4px;}
  .cl-head .t{font-size:12.5px; color:var(--muted);}
  .cl-head .n{font-family:var(--mono); font-size:12px; font-weight:700; color:var(--gold-bright);}

  .q-foot{display:flex; align-items:center; gap:12px; margin-top:22px;}
  .q-foot .btn{padding:12px 22px;}

  /* verdict */
  .verdict{border-radius:var(--r-md); padding:18px 20px; margin-top:20px;}
  .verdict.pass{background:var(--pass-bg); border:1px solid var(--pass-line);}
  .verdict.fail{background:var(--fail-bg); border:1px solid var(--fail-line);}
  .v-head{display:flex; align-items:center; gap:11px;}
  .v-ic{width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;}
  .verdict.pass .v-ic{background:rgba(127,211,164,.2); color:var(--pass);}
  .verdict.fail .v-ic{background:rgba(232,138,132,.2); color:var(--fail);}
  .v-head .vt{font-size:16px; font-weight:750;}
  .verdict.pass .vt{color:var(--pass);} .verdict.fail .vt{color:var(--fail);}
  .v-head .vn{margin-left:auto; font-family:var(--mono); font-size:11.5px;}
  .verdict.pass .vn{color:var(--pass);} .verdict.fail .vn{color:var(--fail);}

// 살러드 탐지: 키워드 나열형(연결어 적고 짧은 토큰 많음 / 반복)을 통계로 잡는다
function looksLikeSalad(text){
  const t=(text||"").trim();
  const tokens=t.split(/[\s,、·\/]+/).filter(Boolean);
  if(tokens.length<6) return false;
  const shortRatio=tokens.filter(w=>w.length<=2).length/tokens.length;
  const uniqRatio=new Set(tokens).size/tokens.length;
  const conn=["로","으로","를","을","에서","에게","에","의","와","과","하고","해서","하라","해줘","하세요","세요","포함","작성","정리","반환","이내","처럼","같이","마다","으며","하며","면서"];
  const connDensity=tokens.filter(w=>conn.some(c=>w.includes(c))).length/tokens.length;
  return (shortRatio>0.55 && connDensity<0.2) || uniqRatio<0.5;
}

// ---------- 문항 생성기 ----------
function genCompare(track, stage, rnd, sub){
  const b=BANK[track][stage], fluff=FLUFF[track][stage];
  const seed=pick(rnd,bySub(b.seeds,sub)), rel=seed.rel;
  const strong=shuffle(rnd, rel.map(id=>seed.facts[id]));
  const dropId=pick(rnd, rel);
  const weak=shuffle(rnd, rel.filter(id=>id!==dropId).map(id=>seed.facts[id]).concat([pick(rnd,fluff)]));
  const strongIsA=rnd()<0.5;
  const A=strongIsA?strong:weak, B=strongIsA?weak:strong, better=strongIsA?"A":"B";
  const distract=pick(rnd, b.distract);
  const missOpts=shuffle(rnd, rel.map(id=>({id,label:b.comps[id].opt})).concat([{id:distract.id,label:distract.opt}]));
  return {type:"compare",
    prompt:"두 프롬프트 중 더 나은 것을 고르고, 약한 쪽이 빠뜨린 핵심을 고르세요.",
    task:seed.text, A, B, better, missOpts, missing:dropId,
    explain:"약한 쪽은 ["+b.comps[dropId].rub+"]를 빠뜨리고 군더더기로 채웠어요. 빠진 걸 채운 쪽이 좋은 프롬프트예요."};
}
function genDiagnoseCtxFmt(track, stage, rnd, sub){
  const b = BANK[track][stage];
  const seed = pick(rnd, bySub(b.seeds,sub));
  const correct = seed.rel.map(id => ({id, label:b.comps[id].opt}));
  const dist = shuffle(rnd, b.distract).slice(0,2);
  const opts = shuffle(rnd, correct.concat(dist.map(d=>({id:d.id,label:d.opt}))));
  const out = seed.rel.map(id => b.comps[id].out).join("; ");
  const tip = stage==="ctx"
    ? "상황(무엇을·어디서·왜)이 비면 AI는 추측만 해요. 빠진 핵심만 짚으세요. 형식·말투는 이 단계 문제가 아니에요."
    : "내용이 아니라 모양이 문제예요. 형식·항목·예시를 정해주면 결과가 깔끔하게 나와요. 대상·말투는 이 단계 문제가 아니에요.";
  const model=seed.model || (seed.rel.map(id=>seed.facts[id]).join(", ")+", "+seed.text);
  return {type:"diagnose",
    prompt:`아래 프롬프트로 이런 결과가 나왔어요. 이 과제에서 가장 크게 빠진 것은? (정답 ${seed.rel.length}개)`,
    bad:seed.text, out:'"'+out+'"', opts, correct:seed.rel, explain:tip, model};
}
function genFixCtxFmt(track, stage, rnd, sub){
  const b = BANK[track][stage];
  const seed = pick(rnd, bySub(b.seeds,sub));
  const rubric = seed.rel.map(id => ({id, label:b.comps[id].rub, rule:b.comps[id].rule}));
  const prompt = stage==="ctx"
    ? "아래 주어진 정보를 담아, AI가 추측하지 않게 프롬프트를 고쳐 보세요."
    : "아래 주어진 정보를 담아, 출력 형식을 정해 고쳐 보세요.";
  const tip = stage==="ctx" ? "대상·증상·목표·환경을 채우면 AI가 추측을 멈춰요." : "형식·항목·예시를 정해주면 결과가 표 한 줄로 깔끔하게 나와요.";
  const facts=seed.rel.map(id=>seed.facts[id]);
  const model=seed.model || (facts.join(", ")+", "+seed.text);   // seed.model = 손으로 다듬은 자연스러운 모범 프롬프트
  return {type:"fix", prompt, seed:seed.text, rubric, explain:tip, model, facts};
}
function genOrder(track, rnd, sub){
  const proc = pick(rnd, bySub(BANK[track].proc, sub));
  const items = proc.steps.map((s,i)=>({id:"s"+i, label:s}));
  return {type:"order",
    prompt:'"'+proc.name+'" 작업을 시키는 올바른 순서로 배열해 보세요.',
    items:shuffle(rnd, items), order:items.map(i=>i.id),
    explain:"순서를 정해주면 AI가 차근차근 풀며 스스로 오류를 잡아요. 올바른 순서 → "+proc.steps.join(" → ")};
}
function genReasonFix(track, rnd, sub){
  const proc = pick(rnd, bySub(BANK[track].proc, sub));
  const facts=["계획부터 세우고 단계로 나눠 진행하게", "끝나면 스스로 점검하게"];
  const rubric=[
    {id:"steps", label:"추론 절차를 지시(계획·단계로 나눔 등)", rule:{any:["단계","계획","먼저","나눠","하나씩","순서"]}},
    {id:"check", label:"자기검토·점검을 요청", rule:{any:["검토","점검","확인","스스로","다시"]}}
  ];
  return {type:"fix",
    prompt:"복잡한 작업이에요. AI가 차근차근 풀도록 프롬프트에 무엇을 넣을지 채워 고쳐 보세요.",
    seed:proc.name+" 해줘", rubric, facts,
    explain:"AI는 한 번에 생각하는 양이 정해져 있다. 계획·단계·자기점검을 시키면 더 차근차근 푼다. (똑똑한 추론 AI는 굳이 안 시켜도 된다)",
    model:facts.join(", ")+", "+proc.name+" 해줘"};
}
function genRubricGoal(track, rnd, sub){
  const g = BANK[track].goal;
  const e = pick(rnd, bySub(g.vbank, sub));
  const model='"'+e.task+'" — '+e.ok.join(", ")+'를 만족시키고, '+e.vague.join("·")+' 같은 모호한 표현은 금지.';
  return {type:"rubric",
    prompt:'"'+e.task+'"에 대해, 통과/실패를 딱 잘라 판정할 수 있는 프롬프트를 작성하세요.',
    rubric:g.rubricComps,
    explain:"합격 조건·구체 예시·금지를 정해주면 결과가 맞았는지 직접 확인할 수 있어요.", model};
}
function genVerif(track, rnd, sub){
  const e = pick(rnd, bySub(BANK[track].goal.vbank, sub));
  const ok = e.ok.map((t,i)=>({id:"k"+i, label:t}));
  const vague = e.vague.map((t,i)=>({id:"g"+i, label:t}));
  return {type:"diagnose",
    prompt:"목표: "+e.task+`. 통과/실패로 판정 가능한 조건을 모두 고르세요. (정답 ${e.ok.length}개)`,
    bad:"목표 = "+e.task, out:"(검증 가능한 조건만 고르세요)",
    opts:shuffle(rnd, ok.concat(vague)), correct:ok.map(o=>o.id),
    explain:"통과/실패를 딱 잘라 판정할 수 있어야 해요. '우아하게'·'빠르게' 같은 형용사는 기준이 못 돼요."};
}
const RECOG_UNTIL = 3;   // 숙련도 0~2: 인지(객관식)만, 3+: 생산(주관식) 등장
function genQuestion(track, li, seed, sub, mastery){
  const rnd = rng(seed);
  const key = LEVELS[li].key;
  const recog = (mastery==null ? 99 : mastery) < RECOG_UNTIL;   // 낮은 숙련도 = 객관식, 높으면 주관식
  if(key==="ctx"||key==="fmt"){
    if(recog) return (rnd()<0.5) ? genDiagnoseCtxFmt(track,key,rnd,sub) : genCompare(track,key,rnd,sub);  // 둘 다 객관식
    const r=rnd();
    if(r<0.25) return genDiagnoseCtxFmt(track,key,rnd,sub);
    if(r<0.45) return genCompare(track,key,rnd,sub);
    return genFixCtxFmt(track,key,rnd,sub);   // 생산형(고치기)
  }
  if(key==="proc"){
    if(recog) return genOrder(track, rnd, sub);                 // 객관식(순서)
    return (rnd()<0.4) ? genOrder(track, rnd, sub) : genReasonFix(track, rnd, sub);
  }
  // goal
  if(recog) return genVerif(track, rnd, sub);                   // 객관식(검증 가능 조건 고르기)
  return (rnd()<0.4) ? genVerif(track, rnd, sub) : genRubricGoal(track, rnd, sub);
}

// ---------- 상태 ----------
const MASTER_N = 5;                         // 스킬별 정답 누적이 이만큼 차면 "익힘"
const KEY = "promptdojo.v2";
let state = JSON.parse(localStorage.getItem(KEY) || "{}");
state.mastery = state.mastery || {};        // 스킬별 누적 정답 수(숙련도 미터)
state.streak = state.streak || {};          // 세션 외 연속(홈 히어로 표시용)
state.seedFor = state.seedFor || {};
state.seedCtr = state.seedCtr || 1;
state.solved = state.solved || 0;          // 누적 정답 수(엔드게임 신호)
state.best = state.best || {};             // 과목별 마스터 최고 연속
let masteryStreak = {};                    // 세션 내 마스터 연속(비영속)
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
const lk = (t,li)=>`${t}.${li}`;
function masteryOf(t,li){ return state.mastery[lk(t,li)]||0; }
function isMastered(t,li){ return masteryOf(t,li)>=MASTER_N; }
function allMastered(t){ return LEVELS.every((_,i)=>isMastered(t,i)); }
function unlocked(t,li){ return true; }    // 강제 순서 제거 — 접근은 결제(paidOk)만 좌우
function seedFor(t,li){
  const k=lk(t,li);
  if(!state.seedFor[k]){ state.seedCtr++; state.seedFor[k]=state.seedCtr; save(); }
  return state.seedFor[k];
}
function newSeed(t,li){ state.seedCtr++; state.seedFor[lk(t,li)]=state.seedCtr; save(); }
function onGrade(t,li,ok){
  if(ok) state.solved++;
  if(li==="m"){   // 마스터 모드: 숙련도 누적 없이 연속·최고만 기록
    if(ok){ masteryStreak[t]=(masteryStreak[t]||0)+1; state.best[t]=Math.max(state.best[t]||0, masteryStreak[t]); }
    else masteryStreak[t]=0;
    save(); return;
  }
  const k=lk(t,li);
  if(ok){ state.mastery[k]=(state.mastery[k]||0)+1; state.streak[k]=(state.streak[k]||0)+1; }
  else { state.streak[k]=0; }   // 숙련도는 누적(감점 없음), 연속만 리셋
  save();
}

function defaultLevel(t){
  for(let i=0;i<LEVELS.length;i++) if(paidOk(t,i) && !isMastered(t,i)) return i;
  for(let i=LEVELS.length-1;i>=0;i--) if(paidOk(t,i)) return i;

function playableLevel(t){
  let last=0;
  for(let i=0;i<LEVELS.length;i++){ if(paidOk(t,i)){ last=i; if(!isMastered(t,i)) return i; } }
  return last;
}
// 모든 진입점이 착지할 레벨: 현재 선택이 풀 수 있으면 유지, 아니면 playableLevel (콜드 페이월 방지)
function landingLevel(t){ const c=selLevel[t]; return (c!=="m" && !isMastered(t,c) && paidOk(t,c)) ? c : playableLevel(t); }
// ---------- 해시 라우팅 (페이지별 URL) ----------

let pendingLevel=null;   // 특정 레벨을 콕 집어 진입(칩 클릭) — 라우팅 보정 대신 그 레벨로
function applyRoute(){
  const h=(location.hash||"").replace(/^#\/?/,"");
  if(h==="settings") view="settings";
  else if(h==="guide") view="guide";
  else if(h==="basics"||h==="coding"||h==="writing"||h==="video"){
    curTrack=h; state.lastTrack=h; save();
    if(pendingLevel!=null){ selLevel[h]=pendingLevel; pendingLevel=null; }
    else if(selLevel[h]!=="m") selLevel[h]=landingLevel(h);
    view="learn";
  }
  else view="home";
  renderApp();
}

  const li=selLevel[t];
  let q,eyebrow,title,intro;
  if(li==="m"){ const ms=seedFor(t,"m"),mr=rng(ms),mli=Math.floor(mr()*LEVELS.length); q=genQuestion(t,mli,ms); eyebrow="마스터 · 무작위 혼합"; title="마스터 모드"; intro="네 가지를 무작위로 섞어 낸다. 감을 유지하자."; }
  else { q=genQuestion(t,li,seedFor(t,li),undefined,masteryOf(t,li)); eyebrow="스킬 "+(li+1)+" · "+LEVELS[li].name; title=LEVELS[li].name; intro=LEVELS[li].why; }

let qcounter=0;
function renderQ(q,t,li){
  const uid=++qcounter;
  const mm = li==="m"?MASTER_N:Math.min(masteryOf(t,li),MASTER_N);
  const KIND={diagnose:["진단","객관식 · 복수 선택"],compare:["짝비교","객관식 · A / B"],order:["순서","절차 배열"],fix:["고치기","주관식 · 실시간 체크"],rubric:["루브릭","주관식 · 사양서형"]}[q.type];
  const card=el("div","q-card");
  card.innerHTML='<div class="q-head"><span class="qtag">'+KIND[0]+'</span><span class="qkind">'+KIND[1]+'</span><span class="q-level">숙련도 '+dots(mm,MASTER_N)+'</span></div>';
  const body=el("div","q-body"); card.appendChild(body);
  let getResult;

  if(q.type==="compare"){
    body.innerHTML='<p class="q-stem">두 요청 중 <span class="accent">더 나은 쪽</span>과, 약한 쪽이 빠뜨린 핵심을 고른다.</p>'+
      '<div class="code-label">과제</div><div class="code">'+esc(q.task)+'</div>'+
      '<div class="pair">'+[["A",q.A],["B",q.B]].map(([L,lines])=>'<div class="pcol"><div class="ptag"><span class="ab">'+L+'</span></div><div class="pbody">'+lines.map(x=>esc(x)).join("<br>")+'</div></div>').join("")+'</div>'+
      '<div class="subq">① 더 나은 쪽</div><div class="opts" id="g1_'+uid+'">'+["A","B"].map(L=>'<div class="opt" data-v="'+L+'" style="padding:12px 16px"><span class="box radio"></span><span class="otx">'+L+'</span></div>').join("")+'</div>'+
      '<div class="subq">② 약한 쪽이 빠뜨린 핵심</div><div class="opts" id="g2_'+uid+'">'+q.missOpts.map(o=>'<div class="opt" data-v="'+o.id+'" style="padding:12px 16px"><span class="box radio"></span><span class="otx">'+esc(o.label)+'</span></div>').join("")+'</div>';
    [body.querySelector("#g1_"+uid),body.querySelector("#g2_"+uid)].forEach(grp=>grp.querySelectorAll(".opt").forEach(o=>o.onclick=()=>{grp.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));o.classList.add("sel");}));
    getResult=()=>{
      const b=body.querySelector("#g1_"+uid+" .opt.sel"), mi=body.querySelector("#g2_"+uid+" .opt.sel");
      if(!b||!mi) return {ok:false, detail:"두 가지를 모두 선택하세요."};
      const ok=b.dataset.v===q.better && mi.dataset.v===q.missing;
      const reveal=()=>{ body.querySelector('#g1_'+uid+' [data-v="'+q.better+'"]').style.borderColor="var(--pass)"; body.querySelector('#g2_'+uid+' [data-v="'+q.missing+'"]').style.borderColor="var(--pass)"; };
      return {ok, detail: ok?"정확하다.":"정답을 표시했어요.", reveal};
    };
  }
  else if(q.type==="diagnose"){
    body.innerHTML='<p class="q-stem">'+esc(q.prompt)+'</p>'+
      '<div class="code-label">프롬프트</div><div class="code">'+esc(q.bad)+'</div>'+
      '<div class="code-label" style="margin-top:12px">결과</div><div class="code">'+esc(q.out)+'</div>'+
      '<div class="opts" id="opts_'+uid+'">'+q.opts.map(o=>'<div class="opt" data-v="'+o.id+'"><span class="box"></span><span class="otx">'+esc(o.label)+'</span></div>').join("")+'</div>';
    body.querySelectorAll("#opts_"+uid+" .opt").forEach(o=>o.onclick=()=>{const on=o.classList.toggle("sel");o.querySelector(".box").textContent=on?"✓":"";});
    getResult=()=>{
      const sel=[...body.querySelectorAll("#opts_"+uid+" .opt.sel")].map(o=>o.dataset.v).sort();
      const ok=JSON.stringify(sel)===JSON.stringify([...q.correct].sort());
      const hit=sel.filter(x=>q.correct.includes(x)).length;
      const reveal=()=>body.querySelectorAll("#opts_"+uid+" .opt").forEach(o=>{ if(q.correct.includes(o.dataset.v))o.style.borderColor="var(--pass)"; else if(o.classList.contains("sel"))o.style.borderColor="var(--fail)"; });
      return {ok, reveal, detail: ok?"정확히 짚었다 — 핵심 "+q.correct.length+"개 전부.":"핵심 "+q.correct.length+"개 중 "+hit+"개만. 정답을 표시했어요."};
    };
  }
  else if(q.type==="order"){
    let order=q.items.map(i=>i.id);
    const list=el("div","order");
    const draw=()=>{ list.innerHTML=""; order.forEach((id,idx)=>{
      const it=q.items.find(x=>x.id===id);
      const row=el("div","ord");
      row.innerHTML='<span class="num">'+(idx+1)+'</span><span class="otx">'+esc(it.label)+'</span><span class="arrows"><button '+(idx===0?"disabled":"")+'>▲</button><button '+(idx===order.length-1?"disabled":"")+'>▼</button></span>';
      const[up,dn]=row.querySelectorAll("button");
      up.onclick=()=>{if(idx>0){[order[idx-1],order[idx]]=[order[idx],order[idx-1]];draw();}};
      dn.onclick=()=>{if(idx<order.length-1){[order[idx+1],order[idx]]=[order[idx],order[idx+1]];draw();}};
      list.appendChild(row);
    }); };
    body.innerHTML='<p class="q-stem">올바른 <span class="accent">절차 순서</span>로 놓는다.</p>';
    body.appendChild(list); draw();
    getResult=()=>({ok:JSON.stringify(order)===JSON.stringify(q.order), detail: JSON.stringify(order)===JSON.stringify(q.order)?"순서가 맞다.":"절차 순서를 다시 보라."});
  }
  else { // fix / rubric
    let html='<p class="q-stem">'+esc(q.prompt)+'</p>';
    if(q.type==="fix"){ html+='<div class="code-label">약한 요청</div><div class="code">'+esc(q.seed)+'</div>';
      if(q.facts) html+='<div class="given"><div class="gl">주어진 정보</div><ul>'+q.facts.map(f=>"<li>"+esc(f)+"</li>").join("")+'</ul></div>'; }
    html+='<textarea class="write" id="ta_'+uid+'" placeholder="'+(q.type==="fix"?"주어진 정보를 담아 다시 써 보세요":"사양서형 프롬프트를 작성하세요")+'"></textarea>'+
      '<div class="cl-head"><span class="t">충족한 항목</span><span class="n" id="cn_'+uid+'">0 / '+q.rubric.length+'</span></div>'+
      '<div class="checklist" id="cl_'+uid+'">'+q.rubric.map(r=>'<div class="check no"><span class="cb"></span>'+esc(r.label)+' <span class="rex">'+ruleHint(r.rule)+'</span></div>').join("")+'</div>';
    body.innerHTML=html;
    const ta=body.querySelector("#ta_"+uid), rows=[...body.querySelectorAll("#cl_"+uid+" .check")];
    const refresh=()=>{ let n=0; q.rubric.forEach((r,i)=>{const ok=detect(ta.value,r.rule); if(ok)n++; rows[i].className="check "+(ok?"ok":"no"); rows[i].querySelector(".cb").textContent=ok?"✓":"";}); body.querySelector("#cn_"+uid).textContent=n+" / "+q.rubric.length; };
    ta.addEventListener("input",refresh); refresh();
    getResult=()=>{
      const salad=looksLikeSalad(ta.value);
      const res=q.rubric.map(r=>({label:r.label, ok:!salad&&detect(ta.value,r.rule)}));
      const met=res.filter(r=>r.ok).length, all=res.every(r=>r.ok);
      let detail='<b>핵심 '+met+' / '+res.length+' 충족</b>'+(salad?'<div class="salad">⚠ 키워드 나열처럼 보입니다 — 자연스러운 지시문으로 쓰세요.</div>':"");
      return {ok:all, detail};
    };
  }

  const foot=el("div","q-foot");
  const grade=el("button","btn btn-gold"); grade.textContent="채점하기";
  foot.appendChild(grade); body.appendChild(foot);
  grade.onclick=()=>{
    const r=getResult(); if(r.ok===false && r.detail && r.detail.indexOf("선택")>=0 && q.type==="compare"){ grade.textContent=r.detail; setTimeout(()=>grade.textContent="채점하기",1200); return; }
    grade.disabled=true; if(typeof r.reveal==="function") r.reveal();
    onGrade(t,li,r.ok);
    const v=el("div","verdict "+(r.ok?"pass":"fail"));
    v.innerHTML='<div class="v-head"><span class="v-ic">'+(r.ok?"✓":"✕")+'</span><span class="vt">'+(r.ok?"통과":"다시")+'</span></div>'+
      '<div class="v-body">'+(r.detail||"")+'<div style="margin-top:8px;color:var(--muted)">'+esc(q.explain)+'</div></div>'+
      (q.model?'<div class="model"><div class="ml">모범 예시</div><div class="code">'+esc(q.model)+'</div></div>':"");
    body.insertBefore(v,foot);
    foot.innerHTML="";
    const onMastered = li!=="m" && isMastered(t,li);
    if(onMastered){
      let nx=-1; for(let i=0;i<LEVELS.length;i++){if(!isMastered(t,i)){nx=i;break;}}
      const go=el("button","btn btn-gold");
      if(nx!==-1){ go.textContent="다음 스킬: "+LEVELS[nx].name+" →"; go.onclick=()=>{selLevel[t]=nx;rerender();}; }
      else { go.textContent="마스터 모드 ★ 도전"; go.onclick=()=>{selLevel[t]="m";rerender();}; }
      foot.appendChild(go);
    }
    const next=el("button","btn btn-ghost"); next.textContent=onMastered?"이 스킬 더 풀기":"다음 문제 →";
    next.onclick=()=>{ newSeed(t,li==="m"?"m":li); rerender(); };
    foot.appendChild(next);
  };
  return card;
}
