name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Node 20 runtime for JS actions is deprecated (removed 2026-09-16, default
# flips to Node 24 on 2026-06-16). Opt in early so the transitive actions
# inside withastro/action (setup-node, upload-artifact) run on Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # GitHub Pages 배포 큐 혼잡 시 기본 10분 타임아웃으로 실패하는 문제 →
          # 30분으로 상향(deployment_queued 상태를 더 오래 견딤).
          timeout: 1800000
